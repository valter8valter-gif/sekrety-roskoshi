<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        // ── АВТООБНОВЛЕНИЕ ── менять APP_VERSION при каждом деплое
        (function() {
            var APP_VERSION = '2026-06-18-001';
            var stored = localStorage.getItem('_srl_ver');
            if (stored && stored !== APP_VERSION) {
                localStorage.setItem('_srl_ver', APP_VERSION);
                window.location.reload(true);
            } else {
                localStorage.setItem('_srl_ver', APP_VERSION);
            }
        })();
    </script>
    <title>Секреты роскоши</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ══ СВЕТЛАЯ ТЕМА (по умолчанию) ══ */
        :root {
            --gold:      #9a6f1a;
            --gold-light:#c49020;
            --gold-dim:  rgba(154,111,26,0.2);
            --gold-glow: rgba(154,111,26,0.08);
            --ice:       #1c1e30;
            --ice-dim:   rgba(28,30,48,0.6);
            --ice-faint: rgba(28,30,48,0.04);
            --bg:        #f5f2eb;
            --bg2:       #ede9de;
            --header-bg: linear-gradient(135deg,rgba(255,255,255,0.85) 0%,rgba(244,235,210,0.8) 100%);
            --auth-bg:   linear-gradient(135deg,rgba(255,255,255,0.9) 0%,rgba(244,235,210,0.85) 100%);
            --error-color:#c0392b;
            --radius:    16px;
            --radius-sm: 10px;
            /* производные */
            --gold-3:    rgba(154,111,26,0.3);
            --gold-4:    rgba(154,111,26,0.4);
            --gold-45:   rgba(154,111,26,0.45);
            --gold-5:    rgba(154,111,26,0.5);
            --gold-8:    rgba(154,111,26,0.8);
            --gold-15:   rgba(154,111,26,0.15);
            --gold-12:   rgba(154,111,26,0.12);
            --gold-08:   rgba(154,111,26,0.08);
            --gold-07:   rgba(154,111,26,0.07);
            --gold-95:   rgba(154,111,26,0.95);
            --card-bg:       rgba(255,255,255,0.6);
            --card-bg-hover: rgba(255,255,255,0.85);
            --placeholder:   rgba(28,30,48,0.3);
            --text-done:     rgba(28,30,48,0.3);
            --search-bg:     rgba(28,30,48,0.04);
            --search-focus:  rgba(255,255,255,0.9);
            --btn-text-gold: #f5f2eb;
            --screen-bg:     linear-gradient(135deg,#f5f2eb 0%,#ede9de 50%,#f5f2eb 100%);
            --table-wrap-bg: rgba(0,0,0,0.04);
        }
        /* ══ ТЁМНАЯ ТЕМА ══ */
        body.theme-dark {
            --gold:      #d4af37;
            --gold-light:#f4d4a8;
            --gold-dim:  rgba(212,175,55,0.2);
            --gold-glow: rgba(212,175,55,0.1);
            --ice:       #f0f6fc;
            --ice-dim:   rgba(240,246,252,0.65);
            --ice-faint: rgba(240,246,252,0.07);
            --bg:        #0f1729;
            --bg2:       #1a2a4a;
            --header-bg: linear-gradient(135deg,var(--card-bg-hover) 0%,rgba(244,212,168,0.1) 100%);
            --auth-bg:   linear-gradient(135deg,var(--card-bg-hover) 0%,rgba(244,212,168,0.1) 100%);
            --gold-3:    rgba(212,175,55,0.3);
            --gold-4:    rgba(212,175,55,0.4);
            --gold-45:   rgba(212,175,55,0.45);
            --gold-5:    rgba(212,175,55,0.5);
            --gold-8:    rgba(212,175,55,0.8);
            --gold-15:   rgba(212,175,55,0.15);
            --gold-12:   rgba(212,175,55,0.12);
            --gold-08:   rgba(212,175,55,0.08);
            --gold-07:   rgba(212,175,55,0.07);
            --gold-95:   rgba(212,175,55,0.95);
            --card-bg:       rgba(212,175,55,0.06);
            --card-bg-hover: rgba(212,175,55,0.1);
            --placeholder:   rgba(240,246,252,0.3);
            --text-done:     rgba(240,246,252,0.3);
            --search-bg:     rgba(212,175,55,0.06);
            --search-focus:  rgba(240,246,252,0.08);
            --btn-text-gold: #1a2a4a;
            --screen-bg:     linear-gradient(135deg,#0f1729 0%,#1a2a4a 50%,#0f1729 100%);
            --table-wrap-bg: rgba(0,0,0,0.2);
        }

        /* ── FOCUS (доступность) ── */
        button:focus-visible,
        input:focus-visible,
        a:focus-visible,
        label:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 2px;
            border-radius: 4px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
            transition: background 0.5s ease, color 0.5s ease;
            color: var(--ice);
            min-height: 100vh;
            min-height: 100dvh;
        }

        .container {
            max-width: min(430px, 100%);
            margin: 0 auto;
            padding: clamp(12px, 4vw, 20px);
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ── ШАПКА ── */
        .header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: clamp(14px, 4vw, 20px);
            border-radius: var(--radius);
            margin-bottom: clamp(14px, 4vw, 20px);
            border: 1px solid var(--gold-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .header-title {
            font-size: clamp(15px, 4.5vw, 20px);
            font-weight: 400;
            background: linear-gradient(135deg, var(--ice) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .header-btns { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .logout-btn {
            padding: clamp(6px, 2vw, 8px) clamp(10px, 3vw, 14px);
            background: var(--gold-glow);
            color: var(--gold);
            border: 1px solid var(--gold-3);
            border-radius: 8px;
            cursor: pointer;
            font-size: clamp(10px, 2.5vw, 11px);
            font-weight: 500;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .logout-btn:hover { background: var(--gold-dim); border-color: var(--gold); }

        /* ── КРУГЛАЯ КНОПКА ТЕМЫ ── */
        .theme-toggle-btn {
            width: clamp(30px, 8vw, 34px);
            height: clamp(30px, 8vw, 34px);
            border-radius: 50%;
            background: var(--gold-glow);
            border: 1px solid var(--gold-3);
            cursor: pointer;
            font-size: clamp(13px, 3.5vw, 15px);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s;
            flex-shrink: 0;
        }
        .theme-toggle-btn:hover { background: var(--gold-dim); border-color: var(--gold); transform: scale(1.1); }

        /* ── ТРАНСФОРМАЦИЯ ── */
        .transformation {
            background: var(--ice-faint);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold-dim);
            border-radius: var(--radius);
            padding: clamp(16px, 5vw, 25px) clamp(14px, 4vw, 20px);
            margin-bottom: clamp(16px, 5vw, 25px);
            text-align: center;
        }
        .transformation-title {
            font-size: clamp(10px, 2.5vw, 12px);
            color: var(--ice);
            margin-top: 18px;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .transformation-image {
            width: clamp(160px, 55vw, 260px);
            height: clamp(160px, 55vw, 260px);
            border-radius: 16px;
            margin: 0 auto 16px;
            display: block;
            object-fit: contain;
            background: transparent;
            mix-blend-mode: normal;
            opacity: 0.8;
            border: none;
            box-shadow: none;
            transition: all 0.8s ease;
        }
        body.theme-dark .transformation-image {
            mix-blend-mode: normal;
            opacity: 1;
            box-shadow: none;
        }
        .progress-bar {
            width: 100%; height: 6px;
            background: var(--gold-glow);
            border-radius: 3px; overflow: hidden;
            margin-bottom: 12px;
        }
        /* .progress-fill defined in @keyframes section above */
        .progress-text {
            font-size: clamp(11px, 3vw, 13px);
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── СТАТИСТИКА ── */
        .neural-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 16px;
        }
        .stat-item {
            background: var(--gold-glow);
            padding: clamp(8px, 3vw, 12px) 4px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--gold-dim);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-align: center;
        }
        .stat-number { font-size: clamp(15px, 4.5vw, 19px); color: var(--gold); line-height: 1; }
        .stat-emoji  { font-size: clamp(13px, 3.5vw, 16px); line-height: 1; display: block; }
        .stat-label  { font-size: clamp(8px, 1.8vw, 9px); color: var(--ice-dim); text-transform: uppercase; letter-spacing: 0.2px; line-height: 1.2; word-break: break-word; }

        /* ── КАРТОЧКА ── */
        .card {
            background: var(--ice-faint);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold-dim);
            border-radius: var(--radius);
            padding: clamp(14px, 4vw, 20px);
            margin-bottom: clamp(14px, 4vw, 20px);
        }
        .card-title {
            font-size: clamp(14px, 4vw, 18px);
            font-weight: 400;
            color: var(--ice);
            margin-bottom: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── ВЫПОЛНЕННЫЕ ── */
        .completed-compact {
            background: var(--gold-glow);
            border: 1px solid var(--gold-dim);
            border-radius: var(--radius-sm);
            padding: clamp(10px, 3vw, 15px);
            margin-bottom: 16px;
            cursor: pointer;
        }
        .completed-header { display: flex; justify-content: space-between; align-items: center; }
        .completed-text { font-size: clamp(11px, 3vw, 13px); color: var(--gold); }
        .completed-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        .completed-item {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--gold-15);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }
        .completed-item-type {
            font-size: 9px; padding: 3px 7px; border-radius: 12px;
            background: var(--gold-15); color: var(--gold);
            text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
        }
        .completed-item-text { font-size: 12px; color: var(--ice-dim); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .completed-item-expanded {
            background: var(--gold-12);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* ── ФИЛЬТРЫ — два чётких ряда ── */
        .filters {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }
        .filters-row {
            display: flex;
            gap: 5px;
            flex-wrap: nowrap;
            align-items: center;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding-bottom: 2px;
        }
        .filters-row::-webkit-scrollbar { display: none; }
        .filter-row-label {
            font-size: clamp(9px, 2vw, 10px);
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            min-width: 56px;
            flex-shrink: 0;
            margin-right: 4px;
            opacity: 0.8;
        }
        .filter-btn {
            padding: clamp(4px, 1.5vw, 6px) clamp(8px, 2.5vw, 11px);
            border-radius: 8px;
            border: 1px solid var(--gold-3);
            background: var(--gold-07);
            color: var(--ice-dim);
            cursor: pointer;
            font-size: clamp(9px, 2.2vw, 10px);
            transition: all 0.25s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .filter-btn:hover { background: var(--gold-15); border-color: var(--gold-5); color: var(--gold); }
        .filter-btn.active { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: var(--btn-text-gold); border-color: var(--gold); font-weight: 600; }

        /* ── ПОИСК ── */
        .search-input {
            width: 100%; padding: clamp(10px, 3vw, 12px) clamp(12px, 3.5vw, 16px);
            background: var(--search-bg);
            border: 1px solid var(--gold-dim);
            border-radius: var(--radius-sm);
            color: var(--ice); font-size: clamp(13px, 3.5vw, 14px);
            font-family: 'Lato', sans-serif;
            margin-bottom: 16px;
        }
        .search-input::placeholder { color: var(--placeholder); }
        .search-input:focus { outline: none; border-color: var(--gold-5); background: var(--search-focus); }

        /* ── СЕКЦИЯ ТИПА (сворачиваемая) ── */
        .type-section { margin-bottom: 20px; }
        .type-header {
            font-size: clamp(13px, 3.5vw, 16px);
            color: var(--ice); margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 1px;
            padding-bottom: 8px; border-bottom: 1px solid var(--gold-dim);
            cursor: pointer; user-select: none;
            display: flex; justify-content: space-between; align-items: center;
        }
        .type-header:hover { color: var(--gold); }
        .type-arrow {
            font-size: 9px; color: var(--gold); opacity: 0.7;
            transition: transform 0.25s; flex-shrink: 0;
        }
        .type-arrow.closed { transform: rotate(-90deg); }

        /* Анимация сворачивания */
        .materials-list {
            overflow: hidden;
            max-height: 9000px;
            opacity: 1;
            transition: max-height 0.35s ease, opacity 0.25s ease;
        }
        .materials-list.collapsed { max-height: 0; opacity: 0; pointer-events: none; }

        /* Поиск с кнопкой очистки */
        .search-wrap { position: relative; margin-bottom: 16px; }
        .search-wrap .search-input { margin-bottom: 0; padding-right: 36px; }
        .search-clear {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--ice-dim); cursor: pointer;
            font-size: 14px; padding: 4px; line-height: 1; transition: color 0.2s;
        }
        .search-clear:hover { color: var(--gold); }

        /* Чекбокс в состоянии сохранения */
        .material-checkbox:disabled { opacity: 0.4; cursor: wait; }

        /* ── КНОПКА СБРОСА ФИЛЬТРОВ ── */
        .filters-reset {
            padding: clamp(4px,1.5vw,5px) clamp(8px,2.5vw,10px);
            border-radius: 6px; border: 1px solid rgba(212,175,55,0.2);
            background: transparent; color: var(--gold-5);
            cursor: pointer; font-size: clamp(9px,2vw,10px);
            font-family: 'Lato', sans-serif; transition: all 0.2s;
            white-space: nowrap;
        }
        .filters-reset:hover { background: rgba(212,175,55,0.1); color: var(--gold); border-color: var(--gold-4); }

        /* ── TOAST-уведомления ── */
        .toast-container {
            position: fixed; bottom: 20px; right: 16px;
            z-index: 9999; pointer-events: none;
            display: flex; flex-direction: column; gap: 8px;
            max-width: min(300px, calc(100vw - 32px));
        }
        .toast {
            padding: 11px 16px; border-radius: 10px;
            font-size: clamp(12px, 3vw, 13px); font-weight: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            pointer-events: auto;
            display: flex; align-items: center; gap: 8px;
            animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .toast.removing {
            animation: toastOut 0.25s ease-in forwards;
        }
        .toast.success { background: var(--gold-95); color: var(--bg); }
        .toast.error   { background: rgba(220,60,60,0.92);  color: #fff; }
        .toast.warning { background: rgba(255,160,0,0.92);  color: var(--bg); }
        .toast.info    { background: rgba(50,100,200,0.88); color: #fff; }
        .toast-icon { font-size: 14px; flex-shrink: 0; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px) scale(0.9); }
            to   { opacity: 1; transform: translateX(0)    scale(1); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0)    scale(1); }
            to   { opacity: 0; transform: translateX(40px) scale(0.9); }
        }

        /* ── МАТЕРИАЛ ── */
        .material-item {
            background: var(--card-bg);
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: var(--radius);
            padding: clamp(14px, 4vw, 18px);
            margin-bottom: 12px;
            transition: all 0.25s;
        }
        .material-item:hover { background: var(--gold-glow); border-color: var(--gold-3); }
        .material-header { display: flex; gap: 12px; align-items: flex-start; }
        .material-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: clamp(20px, 6vw, 22px);
            height: clamp(20px, 6vw, 22px);
            min-width: clamp(20px, 6vw, 22px);
            border: 2px solid var(--gold-45);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            margin-top: 2px;
            flex-shrink: 0;
            display: grid;
            place-content: center;
        }
        .material-checkbox::before {
            content: '';
            width: 10px;
            height: 10px;
            transform: scale(0);
            transition: transform 0.15s ease;
            background: var(--gold);
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .material-checkbox:checked {
            border-color: var(--gold);
            background: var(--gold-12);
        }
        .material-checkbox:checked::before { transform: scale(1); }
        .material-checkbox:hover { border-color: var(--gold); background: var(--gold-08); }
        .material-content { flex: 1; min-width: 0; }
        .material-title {
            color: var(--ice); font-size: clamp(13px, 3.5vw, 15px);
            font-weight: 500; margin-bottom: 8px; cursor: pointer; line-height: 1.4;
        }
        .material-title.completed { text-decoration: line-through; color: var(--text-done); }
        .material-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
        .material-type {
            padding: 3px 9px; background: var(--gold-dim); color: var(--gold);
            font-size: clamp(10px, 2.5vw, 11px); border-radius: 6px;
            text-transform: uppercase; font-weight: 600; flex-shrink: 0;
        }

        /* ── КНОПКИ ССЫЛОК — заметные, золотые ── */
        .links-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; margin-bottom: 4px; }
        .material-link {
            display: inline-block;
            padding: clamp(7px, 2.5vw, 9px) clamp(14px, 4vw, 18px);
            background: linear-gradient(135deg, rgba(212,175,55,0.2) 0%, rgba(212,175,55,0.1) 100%);
            color: var(--gold);
            text-decoration: none;
            border: 1px solid var(--gold-5);
            border-radius: 8px;
            font-size: clamp(11px, 3vw, 13px);
            font-weight: 500;
            transition: all 0.25s;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .material-link:hover {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: var(--btn-text-gold);
            border-color: var(--gold);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--gold-3);
        }

        /* ── FEEDBACK ── */
        .feedback-section {
            margin-top: 12px; padding-top: 12px;
            border-top: 1px solid rgba(212,175,55,0.1);
        }
        .feedback-label { color: var(--ice-dim); font-size: clamp(11px, 3vw, 12px); margin-bottom: 8px; display: block; }
        .feedback-options { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }

        /* radio-кнопки для обратной связи */
        .radio-opt {
            display: flex; align-items: center; gap: 5px;
            padding: clamp(5px,2vw,7px) clamp(9px,3vw,12px);
            font-size: clamp(10px,2.5vw,11px); border-radius: 6px;
            border: 1px solid rgba(212,175,55,0.2);
            background: var(--ice-faint);
            color: var(--ice-dim); cursor: pointer; transition: all 0.2s;
            user-select: none;
        }
        .radio-opt:hover { background: rgba(212,175,55,0.1); border-color: var(--gold-4); }
        .radio-opt.selected { background: rgba(212,175,55,0.2); border-color: var(--gold); color: var(--gold); }
        .radio-dot {
            width: 11px; height: 11px; flex-shrink: 0;

        /* чекбокс "повторить" */

            background: var(--ice-faint);

        }
        .repeat-label:hover { background: var(--gold-08); border-color: var(--gold-3); }
        .repeat-label.active { background: var(--gold-15); border-color: var(--gold-5); color: var(--gold); }
        .repeat-cb {
            appearance: none; -webkit-appearance: none;
            width: 14px; height: 14px; min-width: 14px;
            border: 2px solid var(--gold-45); border-radius: 3px;

        /* ── АВТОРИЗАЦИЯ ── */
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; min-height: 100dvh; padding: 20px; }
        .auth-box {
            background: var(--header-bg);

            border: 1px solid var(--gold-3);
            border-radius: var(--radius);
            padding: clamp(30px, 10vw, 50px) clamp(20px, 8vw, 40px);
            width: 100%; max-width: 400px; text-align: center;
        }
        .auth-title { font-size: clamp(22px, 7vw, 32px); color: var(--gold); margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
        .auth-subtitle { color: var(--ice-dim); font-size: clamp(11px, 3vw, 13px); margin-bottom: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .input-field {
            width: 100%; padding: clamp(10px, 3vw, 12px) clamp(12px, 3.5vw, 16px);
            background: var(--card-bg);
            border: 1px solid var(--gold-dim);
            border-radius: var(--radius-sm); color: var(--ice);
            font-size: clamp(13px, 3.5vw, 14px); margin-bottom: 12px;
            font-family: 'Lato', sans-serif;
        }
        .input-field:focus { outline: none; border-color: var(--gold); background: var(--gold-08); }
        .btn { padding: clamp(10px, 3vw, 12px) 24px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: clamp(13px, 3.5vw, 14px); font-weight: 600; transition: all 0.3s; font-family: 'Lato', sans-serif; }
        .btn-primary { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: var(--bg); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--gold-3); }
        .btn-primary:disabled { opacity: 0.5; cursor: default; transform: none; }
        .btn-secondary { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-4); }
        .btn-secondary:hover { background: var(--gold-3); }
        .admin-link {
            margin-top: 20px;
            display: inline-block;
            color: var(--gold-45);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }
        .admin-link:hover { color: var(--gold); border-bottom-color: var(--gold-4); }

        /* ── АДМИН-ПАНЕЛЬ ── */
        .table-wrapper { overflow-x: auto; max-height: 380px; overflow-y: auto; border-radius: var(--radius-sm); background: var(--table-wrap-bg); margin-top: 12px; }
        .table { width: 100%; border-collapse: collapse; color: var(--ice); font-size: clamp(10px, 2.5vw, 11px); }
        .table thead tr { border-bottom: 1px solid var(--gold-dim); position: sticky; top: 0; background: rgba(212,175,55,0.05); z-index: 10; }
        .table th { padding: 8px 10px; text-align: left; color: var(--gold); font-size: clamp(9px, 2vw, 10px); text-transform: uppercase; font-weight: 400; white-space: nowrap; }
        .table td { padding: 8px 10px; border-bottom: 1px solid var(--gold-08); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .table tbody tr:hover { background: var(--gold-07); }
        .rating-badge { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; background: var(--gold-dim); color: var(--gold); border-radius: 50%; font-weight: 700; font-size: 10px; margin-right: 4px; flex-shrink: 0; }

        .bar-item { display: flex; align-items: center; gap: 5px; width: 100%; }
        .bar-label { font-size: 9px; color: var(--ice); min-width: 44px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bar-fill { height: 14px; background: linear-gradient(90deg, var(--gold-3) 0%, var(--gold-8) 100%); border-radius: 2px; flex: 1; }
        .bar-text { font-size: 9px; color: var(--gold); font-weight: 600; min-width: 24px; text-align: right; }
        .stat-small { display: flex; flex-direction: column; align-items: center; padding: 6px 10px; background: var(--gold-07); border-radius: 8px; }
        .stat-small-value { font-size: clamp(13px, 4vw, 14px); color: var(--gold); font-weight: 600; }
        .stat-small-label { font-size: 8px; color: var(--ice-dim); text-transform: uppercase; margin-top: 2px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--ice-dim); }
        .maintenance-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; padding: 40px 20px; text-align: center; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ── АНИМАЦИЯ ПРОГРЕСС-БАРА ── */
        @keyframes progressShine {
            0%   { background-position: 200% center; }
            100% { background-position: -200% center; }

            30%,70% { box-shadow: 0 0 18px var(--gold), 0 0 36px var(--gold-4); }
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 40%, rgba(255,248,220,0.5) 50%, var(--gold-light) 60%, var(--gold) 100%);

        /* ── РАСКРЫТИЕ ОПИСАНИЯ ── */
        .desc-collapsible {
            max-height: 0;

        .desc-arrow { display: inline-block; transition: transform 0.3s ease; }
        .desc-arrow.open { transform: rotate(180deg); }

        /* ── АНИМАЦИЯ ФОНА ── */
        @keyframes bgPulseLight {
            0%,100% { background: linear-gradient(135deg,#f5f2eb 0%,#ede9de 50%,#f5f2eb 100%); }
            50%      { background: linear-gradient(135deg,#f5f2eb 0%,#eaf0f8 50%,#f5f2eb 100%); }
        }
        @keyframes bgPulseDark {
            0%,100% { background: linear-gradient(135deg,#0f1729 0%,#1a2a4a 50%,#0f1729 100%); }
            50%      { background: linear-gradient(135deg,#0f1729 0%,#1f3255 50%,#0f1729 100%); }
        }

        /* ── PULL-TO-REFRESH ── */
        .ptr-overlay {
            position: fixed; top: 0; left: 0; right: 0;
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 10px; gap: 8px;
            z-index: 999; pointer-events: none; overflow: hidden; height: 80px;
        }
        .ptr-brain {
            font-size: 22px; opacity: 0.5;
            animation: brainFall 0.8s ease-in forwards;
        }
        @keyframes brainFall {
            0%   { transform: translateY(-40px) rotate(0deg);   opacity: 0; }
            20%  { opacity: 0.5; }
            80%  { opacity: 0.5; }
            100% { transform: translateY(80px) rotate(120deg);  opacity: 0; }
        }

        /* ── SWIPE BRAINS (L→R) ── */
        .swipe-brains-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 998; pointer-events: none; overflow: hidden;
        }
        .swipe-brain {
            position: absolute; top: -60px; opacity: 0;
            animation: swipeBrainFall linear forwards;
        }
        @keyframes swipeBrainFall {
            0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.5; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* ── КОНФЕТТИ ── */
        .confetti-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 997; pointer-events: none;
        }
        .confetti-piece {
            position: absolute; top: -30px;
            border-radius: 3px;
        }
        @keyframes confettiFall {
            0%   { transform: translateY(0) rotate(0deg);    opacity: 1; }

            100% { transform: translateY(105vh) rotate(540deg); opacity: 0; }

        @media (max-width: 360px) {
            .analytics-grid { grid-template-columns: 1fr; }
            .neural-stats { grid-template-columns: repeat(2, 1fr); }

    </style>

<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // ================================================================
    // ⚙️  ВСТАВЬ СЮДА СВОЙ GAS URL ПОСЛЕ ШАГА 2
    // ================================================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzH_aUweqoHmsD3Vyk76vAcBDAu1FlZomuBdoYs2-TgOLlRw5Az5LWc-iFdfLbOIwoz/exec';

    // ================================================================
    // 6 СТАДИЙ ТРАНСФОРМАЦИИ — изображения body_0/20/40/60/80/100.png
    // Загрузи эти 6 файлов на GitHub рядом с index.html
    // ================================================================
    const getBodyImage = (pct) => {
        if (pct >= 100) return './body_100.png';
        if (pct >= 80)  return './body_80.png';
        if (pct >= 60)  return './body_60.png';
        if (pct >= 40)  return './body_40.png';
        if (pct >= 20)  return './body_20.png';
        return './body_0.png';
    };

    // ================================================================
    // ВСПОМОГАТЕЛЬНЫЕ ЭКРАНЫ
    // ================================================================

    const LoadingScreen = () => (
        <div style={{display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',minHeight:'100vh',background:'var(--screen-bg)',gap:'20px'}}>
            <div style={{fontSize:'51px',animation:'spin 2s linear infinite'}}>🧠</div>
            <p style={{color:'var(--gold)',fontSize:'clamp(11px,3vw,13px)',letterSpacing:'2px',textTransform:'uppercase'}}>ЗАГРУЗКА...</p>
        </div>
    );

    const AccessDeniedScreen = ({ onBack }) => (
        <div style={{display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',minHeight:'100vh',padding:'24px',textAlign:'center',background:'var(--screen-bg)',gap:'16px'}}>
            <div style={{fontSize:'72px'}}>🔐</div>
            <h1 style={{color:'var(--gold)',fontSize:'clamp(18px,5vw,22px)',letterSpacing:'1.5px',textTransform:'uppercase'}}>ДОСТУП НЕ НАЙДЕН</h1>
            <p style={{color:'var(--ice)',maxWidth:'280px',lineHeight:'1.7',fontSize:'clamp(13px,3.5vw,14px)'}}>
                Вы не добавлены в программу.<br/>Напишите в службу заботы:
            </p>
            <a href="https://t.me/teleskapraktiki" target="_blank" rel="noopener noreferrer"
               style={{color:'var(--gold)',textDecoration:'none',fontSize:'15px',borderBottom:'1px solid #d4af37',paddingBottom:'2px'}}>
                @teleskapraktiki
            </a>
            {onBack && (
                <button onClick={onBack} className="btn btn-secondary" style={{marginTop:'8px'}}>← Назад</button>
            )}
        </div>
    );

    // ================================================================
    // ЭКРАН ВХОДА ДЛЯ УЧАСТНИЦ
    // ================================================================
    function EmailLoginScreen({ onSubmit, isLoading, onAdminEntry }) {
        const [email, setEmail] = useState('');
        const [firstName, setFirstName] = useState('');
        const [error, setError] = useState('');
        const submit = async () => {
            if (!email.trim()) { setError('Введите email'); return; }
            setError('');
            await onSubmit(email.trim(), firstName.trim());
        };
        return (
            <div className="container">
                <div className="auth-container">
                    <div className="auth-box">
                        <div style={{marginBottom:'14px',fontSize:'38px'}}>🧠✨</div>
                        <h1 className="auth-title">СЕКРЕТЫ РОСКОШИ</h1>
                        <p className="auth-subtitle">Введите ваш email</p>
                        <input type="email" placeholder="your@email.com"
                            value={email} onChange={e => setEmail(e.target.value)}
                            onKeyPress={e => e.key === 'Enter' && submit()} className="input-field" />
                        <input type="text" placeholder="Ваше имя"
                            value={firstName} onChange={e => setFirstName(e.target.value)}
                            onKeyPress={e => e.key === 'Enter' && submit()} className="input-field" />
                        {/* Фиксированная высота чтобы окно не прыгало при появлении ошибки */}
                        <p style={{color:'#ff6b6b',fontSize:'12px',marginBottom:'12px',minHeight:'18px',visibility:error?'visible':'hidden'}}>{error || ' '}</p>
                        <button onClick={submit} disabled={isLoading || !email.trim()}
                            className="btn btn-primary" style={{width:'100%'}}>
                            {isLoading ? 'Загрузка...' : 'Войти'}
                        </button>
                        <div>
                            <span className="admin-link" onClick={onAdminEntry}>Администратор →</span>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    // ================================================================
    // ЭКРАН ВХОДА АДМИНИСТРАТОРА
    // ================================================================
    function AdminLoginScreen({ onLogin, onBack, isLoading }) {
        const [pwd, setPwd] = useState('');
        const [error, setError] = useState('');
        const submit = async () => {
            if (!pwd.trim()) { setError('Введите пароль'); return; }
            setError('');
            const ok = await onLogin(pwd.trim());
            if (!ok) setError('Неверный пароль или ошибка подключения');
        };
        return (
            <div className="container">
                <div className="auth-container">
                    <div className="auth-box">
                        <div style={{marginBottom:'14px',fontSize:'38px'}}>🔐</div>
                        <h1 className="auth-title" style={{fontSize:'clamp(18px,5vw,24px)'}}>АДМИНИСТРАТОР</h1>
                        <p className="auth-subtitle">Вход в панель аналитики</p>
                        <input type="password" placeholder="Пароль"
                            value={pwd} onChange={e => setPwd(e.target.value)}
                            onKeyPress={e => e.key === 'Enter' && submit()}
                            className="input-field" autoFocus />
                        {/* Фиксированная высота чтобы окно не прыгало при ошибке или нажатии Назад */}
                        <p style={{color:'#ff6b6b',fontSize:'12px',marginBottom:'12px',minHeight:'18px',visibility:error?'visible':'hidden'}}>{error || ' '}</p>
                        <button onClick={submit} disabled={isLoading}
                            className="btn btn-primary" style={{width:'100%',marginBottom:'10px'}}>
                            {isLoading ? 'Проверка...' : 'Войти'}
                        </button>
                        <button onClick={onBack} className="btn btn-secondary" style={{width:'100%'}}>
                            ← Назад
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    // ================================================================
    // ================================================================
    // ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ — форматирование даты эфира
    // ================================================================
    function formatAirDate(dateStr) {
        const m = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})$/);
        if (!m) return dateStr;
        const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
        const days = ['вс','пн','вт','ср','чт','пт','сб'];
        const d = new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
        return `${parseInt(m[3])} ${months[parseInt(m[2])-1]}, ${days[d.getDay()]}, ${m[4]}:${m[5]}`;
    }

    // ПАНЕЛЬ АДМИНИСТРАТОРА
    // ================================================================
    function AdminPanel({ analytics, analyticsLoading, adminPassword, onLogout, theme, onToggleTheme, onRefresh }) {
        const [expandedTable, setExpandedTable] = useState('overview');
        const [toolsMsg,  setToolsMsg]  = useState(null);
        const [toolsBusy, setToolsBusy] = useState(false);
        const [syncInfo,  setSyncInfo]  = useState(null);
        const [newUser,   setNewUser]   = useState({name:'',email:'',username:'',stream:''});
        const [newUserMsg,setNewUserMsg]= useState(null);
        const [newUserBusy,setNewUserBusy]= useState(false);
        const [newMat,    setNewMat]    = useState({title:'',type:'эфир',link1:'',link2:'',link3:'',description:''});
        const [newMatMsg, setNewMatMsg] = useState(null);
        const [newMatBusy,setNewMatBusy]= useState(false);
        const [adminSchedule, setAdminSchedule] = useState([]);
        const [userFormOpen,  setUserFormOpen]  = useState(false);
        const [matFormOpen,   setMatFormOpen]   = useState(false);
        const [scheduleOpen,  setScheduleOpen]  = useState(false);

        useEffect(() => {
            fetch(`${GAS_URL}?action=getSchedule`)
                .then(r => r.json())
                .then(d => { if (d.success) setAdminSchedule(d.schedule || []); })
                .catch(() => {});
        }, []);

        const submitNewUser = async () => {
            if (!newUser.name.trim() || !newUser.email.trim()) { setNewUserMsg({ok:false,text:'Имя и email обязательны'}); return; }
            setNewUserBusy(true); setNewUserMsg(null);
            try {
                const qs = `action=addUser&adminPassword=${encodeURIComponent(adminPassword)}&name=${encodeURIComponent(newUser.name)}&email=${encodeURIComponent(newUser.email)}&username=${encodeURIComponent(newUser.username)}&stream=${encodeURIComponent(newUser.stream)}`;
                const res = await fetch(`${GAS_URL}?${qs}`);
                const d = await res.json();
                if (d.success) { setNewUserMsg({ok:true,text:'Участница добавлена!'}); setNewUser({name:'',email:'',username:'',stream:''}); }
                else setNewUserMsg({ok:false,text:d.message||d.error||'Ошибка'});
            } catch(e) { setNewUserMsg({ok:false,text:'Ошибка сети'}); }
            finally { setNewUserBusy(false); }
        };

        const submitNewMat = async () => {
            if (!newMat.title.trim() || !newMat.link1.trim()) { setNewMatMsg({ok:false,text:'Название и ссылка 1 обязательны'}); return; }
            setNewMatBusy(true); setNewMatMsg(null);
            try {
                const qs = `action=addMaterial&adminPassword=${encodeURIComponent(adminPassword)}&title=${encodeURIComponent(newMat.title)}&type=${encodeURIComponent(newMat.type)}&link1=${encodeURIComponent(newMat.link1)}&link2=${encodeURIComponent(newMat.link2)}&link3=${encodeURIComponent(newMat.link3)}&description=${encodeURIComponent(newMat.description)}`;
                const res = await fetch(`${GAS_URL}?${qs}`);
                const d = await res.json();
                if (d.success) { setNewMatMsg({ok:true,text:`Материал добавлен (ID: ${d.id})`}); setNewMat({title:'',type:'эфир',link1:'',link2:'',link3:'',description:''}); }
                else setNewMatMsg({ok:false,text:d.message||d.error||'Ошибка'});
            } catch(e) { setNewMatMsg({ok:false,text:'Ошибка сети'}); }
            finally { setNewMatBusy(false); }
        };

        const toolCall = async (params, confirmMsg) => {
            if (confirmMsg && !window.confirm(confirmMsg)) return;
            setToolsBusy(true); setToolsMsg(null); setSyncInfo(null);
            try {
                const qs = Object.entries({...params, adminPassword})
                    .map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join('&');
                const res = await fetch(`${GAS_URL}?${qs}`);
                const d   = await res.json();
                if (d.success) {
                    if (params.action === 'checkSync') setSyncInfo(d.sync);
                    else setToolsMsg({ok:true, text: d.cleared!=null ? `Готово. Затронуто строк: ${d.cleared}` : 'Готово!'});
                } else {
                    setToolsMsg({ok:false, text: d.message || d.error || 'Ошибка'});
                }
            } catch(e) {
                setToolsMsg({ok:false, text:'Ошибка сети: '+e.message});
            } finally { setToolsBusy(false); }
        };

                    </h2>
                    {scheduleOpen && <>
                        {adminSchedule.length === 0 ? (
                            <p style={{color:'var(--ice-dim)',fontSize:'13px',textAlign:'center',padding:'8px 0',marginTop:'12px'}}>Нет предстоящих эфиров</p>
                        ) : (
                            <div style={{display:'flex',flexDirection:'column',gap:'10px',marginTop:'12px'}}>
                                {adminSchedule.map(ev => (

                    </>}

                {/* ── ИНСТРУМЕНТЫ АДМИНИСТРАТОРА ── */}
                <div className="card">
                    <h2 className="card-title">🛠 ИНСТРУМЕНТЫ</h2>
                    <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>

                        </button>
                        <button disabled={toolsBusy}
                            onClick={()=>toolCall({action:'clearLogSheet',sheetName:'Действия'},'Очистить лист «Действия»?')}
                            style={{padding:'10px 14px',borderRadius:'var(--radius-sm)',border:'1px solid var(--gold-dim)',background:'var(--card-bg)',color:'var(--ice)',cursor:'pointer',textAlign:'left',fontFamily:'inherit',fontSize:'14px'}}>

                        </button>

                            onClick={()=>toolCall({action:'clearLogSheet',sheetName:'Ошибки'},'Очистить лист «Ошибки»?')}

                            🧹 Очистить лог «Ошибки»
                        </button>
                    </div>
                    {toolsBusy && <p style={{marginTop:'12px',color:'var(--ice-dim)',fontSize:'13px',textAlign:'center'}}>⏳ Выполняется...</p>}
                    {toolsMsg && <p style={{marginTop:'12px',fontSize:'13px',color:toolsMsg.ok?'#5a8a5a':'var(--error-color)',textAlign:'center'}}>{toolsMsg.text}</p>}
                    {syncInfo && (
                        <div style={{marginTop:'12px',fontSize:'13px',color:'var(--ice)',lineHeight:'1.8'}}>
                            <div>👥 Участниц в базе: <b>{syncInfo.totalUsers}</b></div>
                            <div>📊 Из них с прогрессом: <b>{syncInfo.usersWithProgress}</b></div>
                            <div>📚 Активных материалов: <b>{syncInfo.totalMaterials}</b></div>
                            <div>📝 Строк в progress: <b>{syncInfo.totalProgressRows}</b></div>
                            <div>✅ Выполнено строк: <b>{syncInfo.completedRows}</b></div>
                            {syncInfo.progressKeys?.length>0 && <div style={{marginTop:'6px',fontSize:'11px',color:'var(--ice-dim)',wordBreak:'break-all'}}>Ключи: {syncInfo.progressKeys.join(', ')}</div>}
