    // ================================================================
    // КАБИНЕТ УЧАСТНИЦЫ
    // ================================================================
    function App({ user, onLogout, theme, onToggleTheme }) {
        const [materials, setMaterials] = useState([]);
        const [completions, setCompletions] = useState({});
        const [loading, setLoading] = useState(true);
        const [loadError, setLoadError] = useState(null);
        const [expandCompleted, setExpandCompleted] = useState(false);
        const [expandedCompleted, setExpandedCompleted] = useState({});
        const [collapsedTypes, setCollapsedTypes] = useState({});
        const [expandedDesc, setExpandedDesc] = useState({});
        const [swipeBrains, setSwipeBrains] = useState([]);
        const [showConfetti, setShowConfetti] = useState(false);
        const [confettiPieces, setConfettiPieces] = useState([]);
        const [toasts, setToasts] = useState([]);
        const confettiDoneRef = React.useRef(false);
        const [saving, setSaving] = useState({});
        const [schedule, setSchedule] = useState([]);

        const savedF = (() => { try { return JSON.parse(localStorage.getItem('srl_filters')||'{}'); } catch { return {}; } })();
        const [typeFilter,   setTypeFilter]   = useState(savedF.type   || 'all');
        const [statusFilter, setStatusFilter] = useState(savedF.status || 'all');
        const [searchQuery,  setSearchQuery]  = useState(savedF.search || '');

        useEffect(() => {
            try { localStorage.setItem('srl_filters', JSON.stringify({ type: typeFilter, status: statusFilter, search: searchQuery })); }
            catch {}
        }, [typeFilter, statusFilter, searchQuery]);

        const TOAST_ICONS = { success:'✓', error:'⚠️', warning:'⚡', info:'ℹ️' };
        const showToast = (msg, type='success', duration=2500) => {
            const id = Date.now() + Math.random();
            setToasts(prev => [...prev, { id, msg, type, removing: false }]);
            setTimeout(() => {
                setToasts(prev => prev.map(t => t.id===id ? {...t, removing:true} : t));
                setTimeout(() => setToasts(prev => prev.filter(t => t.id!==id)), 280);
            }, duration);
        };
        const reloadData = async () => {
            setLoading(true);
            try {
                const [matRes, progRes, schedRes] = await Promise.all([
                    fetch(`${GAS_URL}?action=getMaterials`),
                    fetch(`${GAS_URL}?action=getProgress&user_id=${encodeURIComponent(userId)}`),
                    fetch(`${GAS_URL}?action=getSchedule`)
                ]);
                const matData = await matRes.json();
                const progData = await progRes.json();
                const schedData = await schedRes.json();
                const mats = (matData.materials || []).map(m => ({...m, type: (m.type||'').trim().toLowerCase()}));
                const prog = progData.progress || {};
                setMaterials(mats);
                const c = {};
                mats.forEach(m => { c[m.id] = prog[m.id] || { done: false, feedback: '', want_repeat: false }; });
                setCompletions(c);
                if (schedData.success) setSchedule(schedData.schedule || []);
            } catch(e) {} finally { setLoading(false); }
        };

        const resetFilters = () => {
            setTypeFilter('all'); setStatusFilter('all'); setSearchQuery('');
            // Вернуть все строки фильтров к левому краю (чтобы было видно «Все»)
            setTimeout(() => {
                document.querySelectorAll('.filters-row').forEach(el => { el.scrollLeft = 0; });
            }, 0);
            showToast('Фильтры очищены', 'info', 1800);
        };
        const isFiltered = typeFilter !== 'all' || statusFilter !== 'all' || searchQuery.trim();
        const toggleTypeCollapse = (type) => {
            // Запоминаем позицию скролла чтобы не прыгало при сворачивании
            const scrollY = window.scrollY;
            setCollapsedTypes(prev => ({ ...prev, [type]: !prev[type] }));
            requestAnimationFrame(() => window.scrollTo(0, scrollY));
        };

        const userId = String(user?.id || ''); // внутренний id — стабильный ключ прогресса

        useEffect(() => {
            if (!user) return;
            setLoading(true);
            const load = async () => {
                try {
                    const [matRes, progRes, schedRes] = await Promise.all([
                        fetch(`${GAS_URL}?action=getMaterials`),
                        fetch(`${GAS_URL}?action=getProgress&user_id=${encodeURIComponent(userId)}`),
                        fetch(`${GAS_URL}?action=getSchedule`)
                    ]);
                    const matData = await matRes.json();
                    const progData = await progRes.json();
                    const schedData = await schedRes.json();
                    const mats = (matData.materials || []).map(m => ({...m, type: (m.type||'').trim().toLowerCase()}));
                    const prog = progData.progress || {};
                    setMaterials(mats);
                    const c = {};
                    mats.forEach(m => {
                        c[m.id] = prog[m.id] || { done: false, feedback: '', want_repeat: false };
                    });
                    setCompletions(c);
                    if (schedData.success) setSchedule(schedData.schedule || []);
                } catch (e) {
                    setLoadError('Не удалось загрузить данные. Проверьте подключение.');
                } finally {
                    setLoading(false);
                }
            };
            load();
        }, [user]);

        // Свайп справа налево — обновить данные
        useEffect(() => {
            let startX = 0;
            let startY = 0;
            let triggered = false;
            const onTouchStart = (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                triggered = false;
            };
            const onTouchEnd = (e) => {
                if (triggered) return;
                const dx = startX - e.changedTouches[0].clientX; // положительное = свайп влево
                const dy = Math.abs(e.changedTouches[0].clientY - startY);
                if (dx < -80 && dy < 50) { // свайп вправо → падающие мозги
                    triggered = true;
                    window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('light');
                    const brains = Array.from({length: 36}, (_, i) => ({
                        id: i,
                        left: 2 + Math.random() * 96,
                        size: 18 + Math.floor(Math.random() * 28),
                        delay: Math.random() * 800,
                        duration: 1200 + Math.random() * 1000,
                        rotate: Math.random() * 720,
                    }));
                    setSwipeBrains(brains);
                    setTimeout(() => setSwipeBrains([]), 3000);
                }
            };
            document.addEventListener('touchstart', onTouchStart, { passive: true });
            document.addEventListener('touchend', onTouchEnd, { passive: true });
            return () => { document.removeEventListener('touchstart', onTouchStart); document.removeEventListener('touchend', onTouchEnd); };
        }, [user, userId]);

        // Конфетти при 100% — dep array: completions+materials (pct вычисляется внутри)
        useEffect(() => {
            if (!materials.length) return;
            const done = Object.values(completions).filter(c=>c.done).length;
            const p = Math.round(done / materials.length * 100);
            if (p === 100 && !confettiDoneRef.current) {
                confettiDoneRef.current = true;
                const pieces = Array.from({length: 60}, (_, i) => ({
                    id: i,
                    left: Math.random() * 100,
                    delay: Math.random() * 800,
                    duration: 1800 + Math.random() * 1400,
                    color: ['#d4af37','#f4d4a8','#fff5b0','#c9a227','#ffe066','#ffffff'][Math.floor(Math.random()*6)],
                    size: 8 + Math.floor(Math.random() * 12),
                    rotate: Math.random() * 360,
                }));
                setConfettiPieces(pieces);
                setShowConfetti(true);
                window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred('success');
                setTimeout(() => { setShowConfetti(false); confettiDoneRef.current = false; }, 4000);
            }
        }, [completions, materials]);

        const toggleComplete = async (materialId) => {
            if (saving[materialId]) return;
            window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('medium');
            const newDone = !completions[materialId]?.done;
            const hadRepeat = !newDone && !!completions[materialId]?.want_repeat;
            // Снимаем выполнение → автоматически снимаем повтор
            setCompletions(prev => ({
                ...prev,
                [materialId]: { ...prev[materialId], done: newDone, ...(hadRepeat ? { want_repeat: false } : {}) }
            }));
            showToast(newDone ? 'Выполнено' : 'Отменено');
            setSaving(prev => ({ ...prev, [materialId]: true }));
            try {
                await fetch(`${GAS_URL}?action=updateProgress&user_id=${encodeURIComponent(userId)}&material_id=${encodeURIComponent(materialId)}&done=${newDone}`);
                if (hadRepeat) {
                    fetch(`${GAS_URL}?action=saveFeedback&user_id=${encodeURIComponent(userId)}&material_id=${encodeURIComponent(materialId)}&want_repeat=false`);
                }
            } catch (e) {
                setCompletions(prev => ({ ...prev, [materialId]: { ...prev[materialId], done: !newDone, ...(hadRepeat ? { want_repeat: true } : {}) } }));
                showToast('Ошибка сохранения', 'error');
            } finally {
                setSaving(prev => ({ ...prev, [materialId]: false }));
            }
        };

        const saveFeedback = async (materialId, fb) => {
            const cur = completions[materialId]?.feedback;
            const nfb = cur === fb ? '' : fb; // повторный клик = снять выбор
            window.Telegram?.WebApp?.HapticFeedback?.selectionChanged();
            setCompletions(prev => ({ ...prev, [materialId]: { ...prev[materialId], feedback: nfb } }));
            showToast(nfb ? `Отмечено: ${nfb}` : 'Выбор снят', 'success', 2000); // мгновенно
            try {
                await fetch(`${GAS_URL}?action=saveFeedback&user_id=${encodeURIComponent(userId)}&material_id=${encodeURIComponent(materialId)}&feedback=${encodeURIComponent(nfb)}`);
            } catch (e) {
                setCompletions(prev => ({ ...prev, [materialId]: { ...prev[materialId], feedback: cur } }));
                showToast('Ошибка сохранения', 'error');
            }
        };

        const toggleRepeat = async (materialId) => {
            window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('light');
            const ns = !completions[materialId]?.want_repeat;
            setCompletions(prev => ({ ...prev, [materialId]: { ...prev[materialId], want_repeat: ns } }));
            showToast(ns ? 'Добавлено в повтор' : 'Убрано из повтора', ns ? 'success' : 'info', 2000); // мгновенно
            try {
                await fetch(`${GAS_URL}?action=saveFeedback&user_id=${encodeURIComponent(userId)}&material_id=${encodeURIComponent(materialId)}&want_repeat=${ns}`);
            } catch (e) {
                setCompletions(prev => ({ ...prev, [materialId]: { ...prev[materialId], want_repeat: !ns } }));
                showToast('Ошибка сохранения', 'error');
            }
        };

        if (loading) return <LoadingScreen />;

        if (loadError) return (
            <div style={{display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',minHeight:'100vh',background:'var(--screen-bg)',gap:'20px',padding:'24px',textAlign:'center'}}>
                <div style={{fontSize:'60px'}}>⚠️</div>
                <p style={{color:'var(--ice)',fontSize:'14px',maxWidth:'280px',lineHeight:'1.6'}}>{loadError}</p>
                <button onClick={() => window.location.reload()} className="btn btn-primary">Обновить</button>
            </div>
        );

        const totalDone = Object.values(completions).filter(c=>c.done).length;
        const totalMaterials = materials.length;
        const pct = totalMaterials>0 ? Math.round(totalDone/totalMaterials*100) : 0;
        const bodyImg = getBodyImage(pct);

        const typeStats = {};
        materials.forEach(m => {
            if (!typeStats[m.type]) typeStats[m.type]={done:0,total:0};
            typeStats[m.type].total++;
            if (completions[m.id]?.done) typeStats[m.type].done++;
        });
        const TYPE_ORDER = ['эфир','практика','алгоритм','задание'];
        const allTypes = [...new Set(materials.map(m=>m.type))];
        const availableTypes = [...allTypes].sort((a,b) => {
            const ia = TYPE_ORDER.indexOf(a); const ib = TYPE_ORDER.indexOf(b);
            if (ia===-1 && ib===-1) return 0;
            if (ia===-1) return 1;
            if (ib===-1) return -1;
            return ia - ib;
        });
        const typeEmojis = {эфир:'🎤',практика:'🧘',алгоритм:'📋',задание:'📝'};
        const typeLabels = {эфир:'Эфиры',практика:'Практики',алгоритм:'Алгоритмы',задание:'Задания'};
        const completedMaterials = materials.filter(m=>completions[m.id]?.done);
        const repeatMaterials = materials.filter(m=>completions[m.id]?.want_repeat);

        let filtered = materials;
        if (statusFilter==='complete') filtered=completedMaterials;
        else if (statusFilter==='repeat') filtered=repeatMaterials;
        else if (statusFilter==='incomplete') filtered=materials.filter(m=>!completions[m.id]?.done);
        if (typeFilter!=='all') filtered=filtered.filter(m=>m.type===typeFilter);
        if (searchQuery.trim()) filtered=filtered.filter(m=>m.title.toLowerCase().includes(searchQuery.toLowerCase()));
        const grouped = {};
        filtered.forEach(m => { if (!grouped[m.type]) grouped[m.type]=[]; grouped[m.type].push(m); });

        return (
            <React.Fragment>
            {swipeBrains.length > 0 && (
                <div className="swipe-brains-overlay">
                    {swipeBrains.map(b => (
                        <span key={b.id} className="swipe-brain" style={{
                            left:`${b.left}%`,
                            fontSize:`${b.size}px`,
                            animationDelay:`${b.delay}ms`,
                            animationDuration:`${b.duration}ms`,
                        }}>🧠</span>
                    ))}
                </div>
            )}
            {showConfetti && (
                <div className="confetti-overlay">
                    {confettiPieces.map(p => (
                        <div key={p.id} className="confetti-piece" style={{
                            left:`${p.left}%`,
                            backgroundColor: p.color,
                            width:`${p.size}px`,
                            height:`${p.size}px`,
                            animation:`confettiFall ${p.duration}ms ease-in ${p.delay}ms forwards`,
                        }} />
                    ))}
                </div>
            )}
            <div className="container">
                <div className="header">
                    <h1 className="header-title">✨ {(user?.first_name||'Участница').toUpperCase()}</h1>
                    <div className="header-btns">
                        <button onClick={reloadData} className="logout-btn" style={{color:'var(--gold)'}} title="Обновить">🔄</button>
                        <button onClick={onToggleTheme} className="theme-toggle-btn" title="Сменить тему">{theme==='dark'?'☀️':'🌙'}</button>
                        <button onClick={onLogout} className="logout-btn">Выйти</button>
                    </div>
                </div>

                {/* ТРАНСФОРМАЦИЯ */}
                <div className="transformation">
                    <div className="neural-stats">
                        {availableTypes.map(type=>(
                            <div key={type} className="stat-item">
                                <div className="stat-number">{typeStats[type]?.done||0}/{typeStats[type]?.total||0}</div>
                                <span className="stat-emoji">{typeEmojis[type]||'📄'}</span>
                                <div className="stat-label">{typeLabels[type]||type}</div>
                            </div>
                        ))}
                    </div>
                    <h2 className="transformation-title">Текущая интеграция</h2>
                    <img src={bodyImg} alt={`Прогресс ${pct}%`}
                         className="transformation-image"
                         onError={e=>{e.target.style.display='none'}} />
                    <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`}}></div></div>
                    <div className="progress-text">ПРОГРЕСС: {pct}% ЗАВЕРШЕНО</div>
                </div>

                {/* МАТЕРИАЛЫ */}
                <div className="card">
                    <h2 className="card-title">Материалы</h2>

                    {completedMaterials.length>0 && (
                        <div className="completed-compact" onClick={()=>setExpandCompleted(!expandCompleted)}>
                            <div className="completed-header">
                                <div className="completed-text">✅ Завершено: {completedMaterials.length}</div>
                                <div style={{fontSize:'12px',color:'rgba(232,244,248,0.5)'}}>{expandCompleted?'▼':'▶'}</div>
                            </div>
                            {expandCompleted && (
                                <div className="completed-list">
                                    {completedMaterials.map(m=>{
                                        const isExp=expandedCompleted[m.id];
                                        const links=m.links||[];
                                        return (<div key={m.id}>
                                            <div className="completed-item" onClick={e=>{e.stopPropagation();setExpandedCompleted({...expandedCompleted,[m.id]:!isExp});}}>
                                                <span className="completed-item-type">{m.type}</span>
                                                <span className="completed-item-text">{m.title.substring(0,45)}</span>
                                                <span style={{fontSize:'12px',color:'rgba(232,244,248,0.4)'}}>{isExp?'▼':'▶'}</span>
                                            </div>
                                            {isExp && links.length>0 && (
                                                <div className="completed-item-expanded">
                                                    {links.map((lnk,i)=>(
                                                        <a key={i} href={lnk} target="_blank" rel="noopener noreferrer" className="material-link">
                                                            {links.length>1 ? `Часть ${i+1} →` : 'Перейти →'}
                                                        </a>
                                                    ))}
                                                </div>
                                            )}
                                        </div>);
                                    })}
                                </div>
                            )}
                        </div>
                    )}

                    {/* ФИЛЬТРЫ */}
                    <div className="filters">
                        <div className="filters-row">
                            <span className="filter-row-label">Тип:</span>
                            <button className={`filter-btn ${typeFilter==='all'?'active':''}`} onClick={()=>{setTypeFilter('all');window.Telegram?.WebApp?.HapticFeedback?.selectionChanged();}}>Все</button>
                            {availableTypes.map(type=>(
                                <button key={type} className={`filter-btn ${typeFilter===type?'active':''}`} onClick={()=>{setTypeFilter(type);window.Telegram?.WebApp?.HapticFeedback?.selectionChanged();}}>
                                    {typeEmojis[type]||'📄'} {typeLabels[type]||type}
                                </button>
                            ))}
                            {isFiltered && <button className="filters-reset" onClick={()=>{window.Telegram?.WebApp?.HapticFeedback?.selectionChanged();resetFilters();}}>✕ Сброс</button>}
                        </div>
                        <div className="filters-row">
                            <span className="filter-row-label">Статус:</span>
                            <button className={`filter-btn ${statusFilter==='all'?'active':''}`} onClick={()=>{setStatusFilter('all');window.Telegram?.WebApp?.HapticFeedback?.selectionChanged();}}>Все</button>
                            <button className={`filter-btn ${statusFilter==='incomplete'?'active':''}`} onClick={()=>{setStatusFilter('incomplete');window.Telegram?.WebApp?.HapticFeedback?.selectionChanged();}}>✕ Не сделано</button>
                            <button className={`filter-btn ${statusFilter==='complete'?'active':''}`} onClick={()=>{setStatusFilter('complete');window.Telegram?.WebApp?.HapticFeedback?.selectionChanged();}}>✓ Выполнено</button>
                            <button className={`filter-btn ${statusFilter==='repeat'?'active':''}`} onClick={()=>{setStatusFilter('repeat');window.Telegram?.WebApp?.HapticFeedback?.selectionChanged();}}>🔄 Повтор</button>
                        </div>
                    </div>

                    <div className="search-wrap">
                        <input type="text" placeholder="🔍 Поиск по названию..."
                            value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                            className="search-input" aria-label="Поиск по материалам" />
                        {searchQuery && (
                            <button className="search-clear" onClick={()=>setSearchQuery('')} aria-label="Очистить поиск">✕</button>
                        )}
                    </div>

                    {filtered.length>0 ? [...TYPE_ORDER.filter(t=>grouped[t]),...Object.keys(grouped).filter(t=>!TYPE_ORDER.includes(t))].map(type=>(
                        <div key={type} className="type-section">
                            <div className="type-header"
                                onClick={()=>toggleTypeCollapse(type)}
                                aria-expanded={!collapsedTypes[type]}
                                aria-controls={`section-${type}`}
                                role="button" tabIndex="0"
                                onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&toggleTypeCollapse(type)}>
                                <span>{typeEmojis[type]||'📄'} {typeLabels[type]||type} <span style={{fontSize:'clamp(9px,2vw,10px)',color:'var(--ice-dim)',fontWeight:400}}>({grouped[type].length})</span></span>
                                <span className={`type-arrow ${collapsedTypes[type]?'closed':''}`}>▼</span>
                            </div>
                            <div id={`section-${type}`} className={`materials-list ${collapsedTypes[type]?'collapsed':''}`}>
                            {grouped[type].map(material=>{
                                const comp = completions[material.id]||{done:false,feedback:'',want_repeat:false};
                                const links = material.links||[];
                                return (
                                    <div key={material.id} className="material-item">
                                        <div className="material-header">
                                            <input type="checkbox" checked={comp.done}
                                                onChange={()=>{}} // controlled — реальный обработчик в onClick
                                                onClick={()=>{ if (!saving[material.id]) toggleComplete(material.id); }}
                                                disabled={!!saving[material.id]}
                                                className="material-checkbox"
                                                id={`m-${material.id}`}
                                                aria-label={`${comp.done?'Отметить невыполненным':'Отметить выполненным'}: ${material.title}`} />
                                            <div className="material-content">
                                                <label htmlFor={`m-${material.id}`} style={{cursor:'pointer'}}>
                                                    <div className={`material-title ${comp.done?'completed':''}`}>{material.title}</div>
                                                </label>
                                                <div className="material-meta">
                                                    <span className="material-type">{typeLabels[material.type]||material.type}</span>
                                                </div>
                                                {material.description && (
                                                    <div style={{marginBottom:'8px'}}>
                                                        <button onClick={()=>{
                                                            setExpandedDesc(p=>({...p,[material.id]:!p[material.id]}));
                                                            if (navigator.vibrate) navigator.vibrate(8);
                                                        }}
                                                            style={{background:'none',border:'none',color:'var(--gold)',fontSize:'clamp(10px,2.5vw,11px)',cursor:'pointer',padding:'0',textTransform:'uppercase',letterSpacing:'0.5px',fontFamily:'inherit',display:'flex',alignItems:'center',gap:'4px'}}>
                                                            <span className={`desc-arrow${expandedDesc[material.id]?' open':''}`}>▼</span>
                                                            {expandedDesc[material.id]?'Скрыть описание':'Описание'}
                                                        </button>
                                                        <div className={`desc-collapsible${expandedDesc[material.id]?' open':''}`}>
                                                            <div style={{marginTop:'6px',fontSize:'clamp(11px,3vw,13px)',color:'var(--ice-dim)',lineHeight:'1.5',whiteSpace:'pre-wrap'}}>{material.description}</div>
                                                        </div>
                                                    </div>
                                                )}

                                                {links.length>0 && (
                                                    <div className="links-row">
                                                        {links.map((lnk,i)=>(
                                                            <a key={i} href={lnk} target="_blank" rel="noopener noreferrer"
                                                               className="material-link"
                                                               onClick={()=>window.Telegram?.WebApp?.HapticFeedback?.selectionChanged()}>
                                                                {links.length>1 ? `Часть ${i+1} →` : '▶ Открыть материал'}
                                                            </a>
                                                        ))}
                                                    </div>
                                                )}

                                                {comp.done && (
                                                    <div className="feedback-section">
                                                        <label className="feedback-label">Что было самым ценным?</label>
                                                        <div className="feedback-options">
                                                            {['Инсайт','Практика','Пример'].map(opt=>(
                                                                <div key={opt} className={`radio-opt ${comp.feedback===opt?'selected':''}`}
                                                                    onClick={()=>saveFeedback(material.id,opt)}>
                                                                    <span className="radio-dot"></span>
                                                                    {opt}
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <label className={`repeat-label ${comp.want_repeat?'active':''}`}>
                                                            <input type="checkbox" className="repeat-cb"
                                                                checked={comp.want_repeat}
                                                                onChange={()=>toggleRepeat(material.id)} />
                                                            🔄 Хочу повторить
                                                        </label>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            </div>
                        </div>
                    )) : (
                        <div className="empty-state">
                            <p style={{fontSize:'36px',marginBottom:'10px'}}>{isFiltered ? '🔍' : '🎉'}</p>
                            <p style={{marginBottom:isFiltered?'12px':'0'}}>
                                {isFiltered ? 'По этому фильтру ничего не найдено' : 'Все материалы выполнены!'}
                            </p>
                            {isFiltered && (
                                <button className="filters-reset" style={{margin:'0 auto'}} onClick={resetFilters}>
                                    ✕ Сбросить фильтры
                                </button>
                            )}
                        </div>
                    )}
                </div>

                {/* ПРЕДСТОЯЩИЕ ЭФИРЫ */}
                {schedule.length > 0 && (
                    <div className="card" style={{marginTop:'12px'}}>
                        <h2 className="card-title">📡 ПРЕДСТОЯЩИЕ ЭФИРЫ</h2>
                        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                            {schedule.map(ev => (
                                <div key={ev.id} style={{
                                    padding:'12px 14px',
                                    borderRadius:'var(--radius-sm)',
                                    background:'var(--gold-glow)',
                                    border:'1px solid var(--gold-dim)',
                                }}>
                                    <div style={{fontWeight:'600',fontSize:'14px',color:'var(--gold)',marginBottom:'4px'}}>{ev.title}</div>
                                    <div style={{fontSize:'13px',color:'var(--ice-dim)'}}>🗓 {formatAirDate(ev.date_time)}</div>
                                    {ev.description && <div style={{marginTop:'6px',fontSize:'12px',color:'var(--ice-dim)',lineHeight:'1.4',whiteSpace:'pre-wrap'}}>{ev.description}</div>}
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
            {toasts.length > 0 && (
                <div className="toast-container">
                    {toasts.map(t => (
                        <div key={t.id} className={`toast ${t.type}${t.removing?' removing':''}`}>
                            <span className="toast-icon">{TOAST_ICONS[t.type]||'✓'}</span>
                            {t.msg}
                        </div>
                    ))}
                </div>
            )}
            </React.Fragment>
        );
    }

    // ================================================================
    // КОРНЕВОЙ КОМПОНЕНТ
    // ================================================================
    function AppWithTelegramIntegration() {
        const [screen, setScreen] = useState('loading');
        const [user, setUser] = useState(null);
        const [loginLoading, setLoginLoading] = useState(false);
        const [analytics, setAnalytics] = useState(null);
        const [analyticsLoading, setAnalyticsLoading] = useState(false);
        const [adminPassword, setAdminPassword] = useState('');

        const [theme, setTheme] = useState(() => {
            try { return localStorage.getItem('srl_theme') || 'light'; } catch { return 'light'; }
        });
        useEffect(() => {
            document.body.className = theme === 'dark' ? 'theme-dark' : '';
            try { localStorage.setItem('srl_theme', theme); } catch {}
        }, [theme]);
        const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

        useEffect(() => {
            const init = async () => {
                try {
                    if (window.Telegram?.WebApp) {
                        window.Telegram.WebApp.ready();
                        window.Telegram.WebApp.expand();
                        const tg = window.Telegram.WebApp.initDataUnsafe?.user;
                        if (tg) { await checkTelegram(tg); return; }
                    }
                    setScreen('email-login');
                } catch (e) { setScreen('email-login'); }
            };
            init();
        }, []);

        const checkTelegram = async (tg) => {
            try {
                const res = await fetch(`${GAS_URL}?action=getUser&telegram_id=${encodeURIComponent(tg.id)}&username=${encodeURIComponent(tg.username||'')}&email=`);
                const d = await res.json();
                if (d.success && d.user?.access==='yes') {
                    setUser(d.user);
                    setScreen('app');
                    // Фиксируем last_seen в фоне, не блокируем загрузку
                    fetch(`${GAS_URL}?action=updateLastSeen&user_id=${encodeURIComponent(d.user.id)}`).catch(()=>{});
                } else setScreen('access-denied');
            } catch (e) { setScreen('email-login'); }
        };

        const handleEmailLogin = async (email, firstName) => {
            setLoginLoading(true);
            try {
                const res = await fetch(`${GAS_URL}?action=getUser&telegram_id=&username=&email=${encodeURIComponent(email)}`);
                const d = await res.json();
                if (d.success && d.user?.access==='yes') {
                    setUser(d.user);
                    setScreen('app');
                    // Фиксируем last_seen в фоне
                    fetch(`${GAS_URL}?action=updateLastSeen&user_id=${encodeURIComponent(d.user.id)}`).catch(()=>{});
                } else setScreen('access-denied');
            } catch (e) { alert('Ошибка подключения. Попробуйте снова.'); }
            finally { setLoginLoading(false); }
        };

        const handleAdminLogin = async (pwd) => {
            setLoginLoading(true);
            setAnalyticsLoading(true);
            try {
                const res = await fetch(`${GAS_URL}?action=getAnalytics&adminPassword=${encodeURIComponent(pwd)}`);
                const d = await res.json();
                if (d.success) {
                    setAnalytics(d.analytics);
                    setAdminPassword(pwd);
                    setScreen('admin');
                    return true;
                }
                return false;
            } catch (e) {
                return false;
            } finally {
                setLoginLoading(false);
                setAnalyticsLoading(false);
            }
        };

        const handleRefreshAnalytics = async () => {
            setAnalyticsLoading(true);
            try {
                const res = await fetch(`${GAS_URL}?action=getAnalytics&adminPassword=${encodeURIComponent(adminPassword)}`);
                const d = await res.json();
                if (d.success) setAnalytics(d.analytics);
            } catch(e) {} finally { setAnalyticsLoading(false); }
        };

        const handleLogout = () => { setUser(null); setScreen('email-login'); };
        const handleAdminLogout = () => { setAnalytics(null); setAdminPassword(''); setScreen('email-login'); };

        if (screen==='loading')       return <LoadingScreen />;
        if (screen==='access-denied') return <AccessDeniedScreen onBack={() => setScreen('email-login')} />;
        if (screen==='email-login')   return <EmailLoginScreen onSubmit={handleEmailLogin} isLoading={loginLoading} onAdminEntry={() => setScreen('admin-login')} />;
        if (screen==='admin-login')   return <AdminLoginScreen onLogin={handleAdminLogin} onBack={() => setScreen('email-login')} isLoading={loginLoading} />;
        if (screen==='admin')         return <AdminPanel analytics={analytics} analyticsLoading={analyticsLoading} adminPassword={adminPassword} onLogout={handleAdminLogout} theme={theme} onToggleTheme={toggleTheme} onRefresh={handleRefreshAnalytics} />;
        return <App user={user} onLogout={handleLogout} theme={theme} onToggleTheme={toggleTheme} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AppWithTelegramIntegration />);
</script>
</body>
</html>
