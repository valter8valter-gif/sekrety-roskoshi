<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Секреты роскоши</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ══════════════════════════════════════════
           СВЕТЛАЯ ТЕМА (по умолчанию)
        ══════════════════════════════════════════ */
        :root {
            /* Медовый акцент (вместо золота) */
            --gold: #D4A86F;
            --gold-light: #E8C9A0;
            --gold-dim: rgba(212,168,111,0.22);
            --gold-glow: rgba(212,168,111,0.1);
            --gold-btn-text: #fff;

            /* Текст */
            --ice: #2C3E50;
            --ice-dim: rgba(44,62,80,0.6);
            --ice-faint: rgba(200,217,232,0.12);

            /* Фон */
            --bg: #F5F3F0;
            --bg2: #FEFAF5;

            /* Поверхности — голубоватые карточки */
            --surface: rgba(200,217,232,0.28);
            --surface-hover: rgba(200,217,232,0.48);
            --border: rgba(200,217,232,0.6);
            --border-hover: rgba(212,168,111,0.5);

            /* Тени */
            --shadow: 0 2px 16px rgba(0,0,0,0.08);
            --shadow-card: 0 1px 8px rgba(0,0,0,0.06);

            /* Блоки */
            --header-bg: linear-gradient(135deg, rgba(200,217,232,0.25) 0%, rgba(212,168,111,0.15) 100%);
            --auth-bg: linear-gradient(135deg, rgba(200,217,232,0.25) 0%, rgba(212,168,111,0.15) 100%);
            --input-bg: rgba(200,217,232,0.18);
            --input-focus-bg: rgba(212,168,111,0.1);
            --progress-bar-bg: rgba(212,168,111,0.15);
            --table-header-bg: rgba(200,217,232,0.25);

            /* Семантические цвета */
            --green: #5FA06A;
            --green-lighter: #66B366;
            --red: #8B3A3A;
            --blue: #C8D9E8;
            --error-color: #8B3A3A;

            --radius: 16px;
            --radius-sm: 10px;
        }

        /* ══════════════════════════════════════════
           ТЁМНАЯ ТЕМА
        ══════════════════════════════════════════ */
        body.theme-dark {
            --gold: #d4af37;
            --gold-light: #f4d4a8;
            --gold-dim: rgba(212,175,55,0.2);
            --gold-glow: rgba(212,175,55,0.1);
            --gold-btn-text: #0f1729;
            --ice: #f0f6fc;
            --ice-dim: rgba(240,246,252,0.65);
            --ice-faint: rgba(240,246,252,0.07);
            --bg: #0f1729;
            --bg2: #1a2a4a;
            --surface: rgba(232,244,248,0.05);
            --surface-hover: rgba(212,175,55,0.1);
            --border: rgba(212,175,55,0.1);
            --border-hover: rgba(212,175,55,0.3);
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-card: 0 2px 12px rgba(0,0,0,0.3);
            --header-bg: linear-gradient(135deg, rgba(232,244,248,0.15) 0%, rgba(244,212,168,0.1) 100%);
            --auth-bg: linear-gradient(135deg, rgba(232,244,248,0.15) 0%, rgba(244,212,168,0.1) 100%);
            --input-bg: rgba(232,244,248,0.05);
            --input-focus-bg: rgba(212,175,55,0.08);
            --progress-bar-bg: rgba(212,175,55,0.1);
            --table-header-bg: rgba(212,175,55,0.05);
        }

        /* ── ФОКУС (доступность) ── */
        button:focus-visible, input:focus-visible, a:focus-visible, label:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 2px;
            border-radius: 4px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
            color: var(--ice);
            min-height: 100vh;
            min-height: 100dvh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: min(430px, 100%);
            margin: 0 auto;
            padding: clamp(12px, 4vw, 20px);
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ── ПОЛНОЭКРАННЫЙ КОНТЕЙНЕР (загрузка, ошибки, авторизация) ── */
        .full-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
            gap: 16px;
            padding: 24px;
            text-align: center;
        }

        /* ── ШАПКА ── */
        .header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: clamp(14px, 4vw, 20px);
            border-radius: var(--radius);
            margin-bottom: clamp(14px, 4vw, 20px);
            border: 1px solid var(--gold-dim);
            box-shadow: var(--shadow-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .header-title {
            font-size: clamp(15px, 4.5vw, 20px);
            font-weight: 400;
            background: linear-gradient(135deg, var(--ice) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .header-btns { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

        /* ── КНОПКА ПЕРЕКЛЮЧЕНИЯ ТЕМЫ ── */
        .theme-toggle-btn {
            width: clamp(30px, 8vw, 34px);
            height: clamp(30px, 8vw, 34px);
            border-radius: 50%;
            border: 1px solid var(--gold-dim);
            background: var(--gold-glow);
            cursor: pointer;
            font-size: clamp(13px, 3.5vw, 15px);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s;
            flex-shrink: 0;
        }
        .theme-toggle-btn:hover { background: var(--gold-dim); border-color: var(--gold); transform: scale(1.1); }

        .logout-btn {
            padding: clamp(6px, 2vw, 8px) clamp(10px, 3vw, 14px);
            background: var(--gold-glow);
            color: var(--gold);
            border: 1px solid var(--gold-dim);
            border-radius: 8px;
            cursor: pointer;
            font-size: clamp(10px, 2.5vw, 11px);
            font-weight: 500;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .logout-btn:hover { background: var(--gold-dim); border-color: var(--gold); }

        /* ── ТРАНСФОРМАЦИЯ ── */
        .transformation {
            background: #C8D9E8;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(200,217,232,0.7);
            border-radius: var(--radius);
            padding: clamp(16px, 5vw, 25px) clamp(14px, 4vw, 20px);
            margin-bottom: clamp(16px, 5vw, 25px);
            text-align: center;
            box-shadow: var(--shadow-card);
        }
        body.theme-dark .transformation {
            background: var(--surface);
            border: 1px solid var(--gold-dim);
        }
        .transformation-title {
            font-size: clamp(10px, 2.5vw, 12px);
            color: var(--ice);
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.7;
        }
        .transformation-visual {
            width: clamp(80px, 25vw, 100px);
            height: clamp(80px, 25vw, 100px);
            border-radius: 50%;
            margin: 0 auto 16px;
            border: 2px solid rgba(212,175,55,0.3);
            box-shadow: 0 0 clamp(15px, 5vw, 30px) rgba(212,175,55,0.15);
            transition: all 0.8s ease;
            position: relative;
            overflow: hidden;
        }
        .transformation-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(ellipse at 50% 30%, rgba(212,175,55,0.15) 0%, transparent 70%);
        }
        .progress-bar {
            width: 100%; height: 6px;
            background: var(--progress-bar-bg);
            border-radius: 3px; overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
            transition: width 0.6s ease;
        }
        .progress-text {
            font-size: clamp(11px, 3vw, 13px);
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── СТАТИСТИКА ── */
        .neural-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 16px;
        }
        .stat-item {
            background: var(--gold-glow);
            padding: clamp(8px, 3vw, 12px) 4px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--gold-dim);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-align: center;
        }
        .stat-number { font-size: clamp(15px, 4.5vw, 19px); color: var(--gold); line-height: 1; }
        .stat-emoji  { font-size: clamp(13px, 3.5vw, 16px); line-height: 1; display: block; }
        .stat-label  { font-size: clamp(8px, 1.8vw, 9px); color: var(--ice-dim); text-transform: uppercase; letter-spacing: 0.2px; line-height: 1.2; word-break: break-word; }

        /* ── КАРТОЧКА ── */
        .card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold-dim);
            border-radius: var(--radius);
            padding: clamp(14px, 4vw, 20px);
            margin-bottom: clamp(14px, 4vw, 20px);
            box-shadow: var(--shadow-card);
        }
        .card-title {
            font-size: clamp(14px, 4vw, 18px);
            font-weight: 400;
            color: var(--ice);
            margin-bottom: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── ВЫПОЛНЕННЫЕ ── */
        .completed-compact {
            background: var(--gold-glow);
            border: 1px solid var(--gold-dim);
            border-radius: var(--radius-sm);
            padding: clamp(10px, 3vw, 15px);
            margin-bottom: 16px;
            cursor: pointer;
        }
        .completed-header { display: flex; justify-content: space-between; align-items: center; }
        .completed-text { font-size: clamp(11px, 3vw, 13px); color: var(--gold); }
        .completed-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        .completed-item {
            background: var(--ice-faint);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }
        .completed-item-type {
            font-size: 9px; padding: 3px 7px; border-radius: 12px;
            background: var(--gold-dim); color: var(--gold);
            text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
        }
        .completed-item-text { font-size: 12px; color: var(--ice-dim); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .completed-item-expanded {
            background: var(--gold-dim);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* ── ФИЛЬТРЫ ── */
        .filters { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
        .filters-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .filter-row-label {
            font-size: clamp(9px, 2vw, 10px); color: var(--gold);
            text-transform: uppercase; letter-spacing: 0.5px;
            white-space: nowrap; min-width: 42px; opacity: 0.8;
        }
        .filter-btn {
            padding: clamp(6px, 2vw, 8px) clamp(10px, 3vw, 14px);
            border-radius: 8px; border: 1px solid var(--border);
            background: var(--ice-faint); color: var(--ice-dim);
            cursor: pointer; font-size: clamp(10px, 2.5vw, 11px);
            transition: all 0.25s; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
            font-family: 'Lato', sans-serif;
        }
        .filter-btn:hover { background: var(--gold-dim); border-color: var(--border-hover); color: var(--gold); }
        .filter-btn.active {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: var(--gold-btn-text); border-color: var(--gold); font-weight: 600;
        }

        /* ── ПОИСК ── */
        .search-wrap { position: relative; margin-bottom: 16px; }
        .search-input {
            width: 100%; padding: clamp(10px, 3vw, 12px) clamp(12px, 3.5vw, 16px);
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--ice); font-size: clamp(13px, 3.5vw, 14px);
            font-family: 'Lato', sans-serif;
            padding-right: 36px;
        }
        .search-input::placeholder { color: var(--ice-dim); opacity: 0.6; }
        .search-input:focus { outline: none; border-color: var(--gold); background: var(--input-focus-bg); }
        .search-clear {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--ice-dim); cursor: pointer;
            font-size: 14px; padding: 4px; line-height: 1; transition: color 0.2s;
        }
        .search-clear:hover { color: var(--gold); }

        /* ── КНОПКА СБРОСА ФИЛЬТРОВ ── */
        .filters-reset {
            padding: clamp(4px,1.5vw,5px) clamp(8px,2.5vw,10px);
            border-radius: 6px; border: 1px solid var(--border);
            background: transparent; color: var(--ice-dim);
            cursor: pointer; font-size: clamp(9px,2vw,10px);
            font-family: 'Lato', sans-serif; transition: all 0.2s; white-space: nowrap;
        }
        .filters-reset:hover { background: var(--gold-dim); color: var(--gold); border-color: var(--border-hover); }

        /* ── СЕКЦИЯ ТИПА (сворачиваемая) ── */
        .type-section { margin-bottom: 20px; }
        .type-header {
            font-size: clamp(13px, 3.5vw, 16px);
            color: var(--ice); margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 1px;
            padding-bottom: 8px; border-bottom: 1px solid var(--border);
            cursor: pointer; user-select: none;
            display: flex; justify-content: space-between; align-items: center;
        }
        .type-header:hover { color: var(--gold); }
        .type-arrow { font-size: 9px; color: var(--gold); opacity: 0.7; transition: transform 0.25s; flex-shrink: 0; }
        .type-arrow.closed { transform: rotate(-90deg); }

        .materials-list {
            overflow: hidden; max-height: 9000px; opacity: 1;
            transition: max-height 0.35s ease, opacity 0.25s ease;
        }
        .materials-list.collapsed { max-height: 0; opacity: 0; pointer-events: none; }

        /* ── ТОСТ-УВЕДОМЛЕНИЯ ── */
        .toast-container {
            position: fixed; bottom: 20px; right: 16px;
            z-index: 9999; pointer-events: none;
            display: flex; flex-direction: column; gap: 8px;
            max-width: min(300px, calc(100vw - 32px));
        }
        .toast {
            padding: 11px 16px; border-radius: 10px;
            font-size: clamp(12px, 3vw, 13px); font-weight: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            pointer-events: auto;
            display: flex; align-items: center; gap: 8px;
            animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .toast.removing { animation: toastOut 0.25s ease-in forwards; }
        .toast.success { background: #5FA06A; color: #fff; }
        .toast.error   { background: #8B3A3A; color: #fff; }
        .toast.warning { background: #D4A86F; color: #fff; }
        .toast.info    { background: rgba(50,100,200,0.88); color: #fff; }
        body.theme-dark .toast.success { background: rgba(212,175,55,0.95); color: #0f1729; }
        body.theme-dark .toast.warning { background: rgba(255,160,0,0.92);  color: #0f1729; }
        body.theme-dark .toast.error   { background: rgba(220,60,60,0.92);  color: #fff; }
        .toast-icon { font-size: 14px; flex-shrink: 0; }
        @keyframes toastIn  { from { opacity:0; transform: translateX(40px) scale(0.9); } to { opacity:1; transform: translateX(0) scale(1); } }
        @keyframes toastOut { from { opacity:1; transform: translateX(0) scale(1); } to { opacity:0; transform: translateX(40px) scale(0.9); } }

        /* ── МАТЕРИАЛ ── */
        .material-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: clamp(14px, 4vw, 18px);
            margin-bottom: 12px;
            transition: all 0.25s;
        }
        .material-item:hover { background: var(--surface-hover); border-color: var(--border-hover); }
        .material-header { display: flex; gap: 12px; align-items: flex-start; }
        .material-checkbox {
            appearance: none; -webkit-appearance: none;
            width: clamp(20px, 6vw, 22px); height: clamp(20px, 6vw, 22px);
            min-width: clamp(20px, 6vw, 22px);
            border: 2px solid var(--border-hover);
            border-radius: 5px; cursor: pointer; transition: all 0.2s;
            background: transparent; margin-top: 2px; flex-shrink: 0;
            display: grid; place-content: center;
        }
        .material-checkbox::before {
            content: ''; width: 10px; height: 10px;
            transform: scale(0); transition: transform 0.15s ease;
            background: var(--gold);
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .material-checkbox:checked { border-color: var(--green,#5FA06A); background: rgba(95,160,106,0.12); }
        body.theme-dark .material-checkbox:checked { border-color: var(--gold); background: var(--gold-glow); }
        .material-checkbox:checked::before { transform: scale(1); background: var(--green,#5FA06A); }
        body.theme-dark .material-checkbox:checked::before { background: var(--gold); }
        .material-checkbox:hover { border-color: var(--green,#5FA06A); background: rgba(95,160,106,0.08); }
        body.theme-dark .material-checkbox:hover { border-color: var(--gold); background: var(--gold-glow); }
        .material-checkbox:disabled { opacity: 0.4; cursor: wait; }

        .material-content { flex: 1; min-width: 0; }
        .material-title {
            color: var(--ice); font-size: clamp(13px, 3.5vw, 15px);
            font-weight: 500; margin-bottom: 8px; cursor: pointer; line-height: 1.4;
        }
        .material-title.completed { text-decoration: line-through; color: var(--ice-dim); }
        .material-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
        .material-type {
            padding: 3px 9px; background: var(--gold-dim); color: var(--gold);
            font-size: clamp(10px, 2.5vw, 11px); border-radius: 6px;
            text-transform: uppercase; font-weight: 600; flex-shrink: 0;
        }

        /* ── ОПИСАНИЕ МАТЕРИАЛА (сворачиваемое) ── */
        .desc-toggle {
            background: none; border: none;
            color: var(--gold); cursor: pointer;
            font-size: clamp(10px, 2.5vw, 11px);
            padding: 3px 0;
            margin-bottom: 6px;
            display: flex; align-items: center; gap: 4px;
            opacity: 0.75; transition: opacity 0.2s;
            font-family: 'Lato', sans-serif;
            letter-spacing: 0.3px;
        }
        .desc-toggle:hover { opacity: 1; }
        .desc-body {
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.25s ease;
            opacity: 0;
        }
        .desc-body.expanded { max-height: 400px; opacity: 1; }
        .desc-text {
            font-size: clamp(11px, 3vw, 12px);
            color: var(--ice-dim);
            line-height: 1.65;
            padding: 8px 10px;
            background: var(--ice-faint);
            border-left: 2px solid var(--gold-dim);
            border-radius: 0 6px 6px 0;
            margin-bottom: 8px;
        }

        /* ── КНОПКИ ССЫЛОК ── */
        .links-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; margin-bottom: 4px; }
        .material-link {
            display: inline-block;
            padding: clamp(7px, 2.5vw, 9px) clamp(14px, 4vw, 18px);
            background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold-glow) 100%);
            color: var(--gold);
            text-decoration: none;
            border: 1px solid var(--border-hover);
            border-radius: 8px;
            font-size: clamp(11px, 3vw, 13px);
            font-weight: 500;
            transition: all 0.25s;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .material-link:hover {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: var(--gold-btn-text);
            border-color: var(--gold);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(154,111,26,0.25);
        }
        body.theme-dark .material-link:hover { box-shadow: 0 4px 12px rgba(212,175,55,0.3); }

        /* ── FEEDBACK ── */
        .feedback-section {
            margin-top: 12px; padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .feedback-label { color: var(--ice-dim); font-size: clamp(11px, 3vw, 12px); margin-bottom: 8px; display: block; }
        .feedback-options { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
        .radio-opt {
            display: flex; align-items: center; gap: 5px;
            padding: clamp(5px,2vw,7px) clamp(9px,3vw,12px);
            font-size: clamp(10px,2.5vw,11px); border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--ice-faint);
            color: var(--ice-dim); cursor: pointer; transition: all 0.2s;
            user-select: none;
        }
        .radio-opt:hover { background: var(--gold-dim); border-color: var(--border-hover); }
        .radio-opt.selected { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
        .radio-opt input[type="radio"] {
            appearance: none; -webkit-appearance: none;
            width: 11px; height: 11px; flex-shrink: 0;
            border: 2px solid var(--border-hover); border-radius: 50%;
            transition: all 0.15s; display: grid; place-content: center;
        }
        .radio-opt input[type="radio"]::before {
            content: ''; width: 5px; height: 5px; border-radius: 50%;
            background: var(--gold); transform: scale(0); transition: transform 0.15s;
        }
        .radio-opt input[type="radio"]:checked { border-color: var(--gold); }
        .radio-opt input[type="radio"]:checked::before { transform: scale(1); }
        .repeat-label {
            display: flex; align-items: center; gap: 8px;
            width: 100%; padding: clamp(7px,2.5vw,9px) 12px; margin-top: 8px;
            border-radius: 8px; cursor: pointer; font-size: clamp(11px,3vw,12px);
            border: 1px solid var(--border);
            background: var(--ice-faint);
            color: var(--ice-dim); transition: all 0.2s; user-select: none;
        }
        .repeat-label:hover { background: var(--gold-dim); border-color: var(--border-hover); }
        .repeat-label.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
        .repeat-cb {
            appearance: none; -webkit-appearance: none;
            width: 14px; height: 14px; min-width: 14px;
            border: 2px solid var(--border-hover); border-radius: 3px;
            cursor: pointer; transition: all 0.15s;
            background: transparent; display: grid; place-content: center;
        }
        .repeat-cb::before {
            content: ''; width: 7px; height: 7px;
            transform: scale(0); transition: transform 0.15s;
            background: var(--gold);
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .repeat-cb:checked { border-color: var(--green,#5FA06A); background: rgba(95,160,106,0.12); }
        body.theme-dark .repeat-cb:checked { border-color: var(--gold); background: var(--gold-glow); }
        .repeat-cb:checked::before { transform: scale(1); background: var(--green,#5FA06A); }
        body.theme-dark .repeat-cb:checked::before { background: var(--gold); }

        /* ── АВТОРИЗАЦИЯ ── */
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; min-height: 100dvh; padding: 20px; }
        .auth-box {
            background: var(--auth-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--gold-dim);
            border-radius: var(--radius);
            padding: clamp(30px, 10vw, 50px) clamp(20px, 8vw, 40px);
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: var(--shadow);
        }
        .auth-title { font-size: clamp(22px, 7vw, 32px); color: var(--gold); margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
        .auth-subtitle { color: var(--ice-dim); font-size: clamp(11px, 3vw, 13px); margin-bottom: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .input-field {
            width: 100%; padding: clamp(10px, 3vw, 12px) clamp(12px, 3.5vw, 16px);
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--ice);
            font-size: clamp(13px, 3.5vw, 14px); margin-bottom: 12px;
            font-family: 'Lato', sans-serif;
        }
        .input-field:focus { outline: none; border-color: var(--gold); background: var(--input-focus-bg); }
        .btn { padding: clamp(10px, 3vw, 12px) 24px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: clamp(13px, 3.5vw, 14px); font-weight: 600; transition: all 0.3s; font-family: 'Lato', sans-serif; }
        .btn-primary { background: linear-gradient(135deg, var(--green) 0%, var(--green-lighter) 100%); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(95,160,106,0.35); }
        body.theme-dark .btn-primary { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: var(--gold-btn-text); }
        body.theme-dark .btn-primary:hover { box-shadow: 0 8px 25px rgba(212,175,55,0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: default; transform: none; }
        .btn-secondary { background: var(--blue,#C8D9E8); color: var(--ice); border: 1px solid var(--border); }
        body.theme-dark .btn-secondary { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--border-hover); }
        .btn-secondary:hover { opacity: 0.85; }
        .admin-link {
            margin-top: 20px; display: inline-block; color: var(--ice-dim);
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
            cursor: pointer; border-bottom: 1px solid transparent; transition: all 0.2s; opacity: 0.6;
        }
        .admin-link:hover { color: var(--gold); border-bottom-color: var(--gold-dim); opacity: 1; }

        /* ── АДМИН-ПАНЕЛЬ ── */
        .table-wrapper { overflow-x: auto; max-height: 380px; overflow-y: auto; border-radius: var(--radius-sm); background: var(--ice-faint); margin-top: 12px; }
        .table { width: 100%; border-collapse: collapse; color: var(--ice); font-size: clamp(10px, 2.5vw, 11px); }
        .table thead tr { border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--table-header-bg); z-index: 10; }
        .table th { padding: 8px 10px; text-align: left; color: var(--gold); font-size: clamp(9px, 2vw, 10px); text-transform: uppercase; font-weight: 400; white-space: nowrap; }
        .table td { padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .table tbody tr:hover { background: var(--gold-glow); }
        .rating-badge { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; background: var(--gold-dim); color: var(--gold); border-radius: 50%; font-weight: 700; font-size: 10px; margin-right: 4px; flex-shrink: 0; }
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .chart-container { background: var(--ice-faint); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 120px; }
        .chart-title { font-size: 9px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; text-align: center; width: 100%; }
        .bar-chart { width: 100%; display: flex; flex-direction: column; gap: 5px; }
        .bar-item { display: flex; align-items: center; gap: 5px; width: 100%; }
        .bar-label { font-size: 9px; color: var(--ice); min-width: 44px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bar-fill { height: 14px; background: linear-gradient(90deg, var(--gold-dim) 0%, var(--gold) 100%); border-radius: 2px; flex: 1; }
        .bar-text { font-size: 9px; color: var(--gold); font-weight: 600; min-width: 24px; text-align: right; }
        .stat-small { display: flex; flex-direction: column; align-items: center; padding: 6px 10px; background: var(--gold-glow); border-radius: 8px; }
        .stat-small-value { font-size: clamp(13px, 4vw, 14px); color: var(--gold); font-weight: 600; }
        .stat-small-label { font-size: 8px; color: var(--ice-dim); text-transform: uppercase; margin-top: 2px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--ice-dim); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 360px) {
            .analytics-grid { grid-template-columns: 1fr; }
            .neural-stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // ================================================================
    // ⚙️  ВСТАВЬ СЮДА СВОЙ GAS URL ПОСЛЕ ДЕПЛОЯ v2
    // ================================================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxy3h5V6slni5gdygCxmLKF7qmMJid3VuytOX6HyAr1c6QCuFOEicyG1RQoUFx-uZOrjA/exec';

    // ================================================================
    // 11 СТАДИЙ ТРАНСФОРМАЦИИ
    // ================================================================
    const STAGES = [
        { g: 'radial-gradient(ellipse at 50% 70%, #0f1729 0%, #080d18 100%)',               glow: '0 0 20px rgba(10,20,60,0.3)'   },
        { g: 'radial-gradient(ellipse at 50% 65%, #141f3a 0%, #0a0f20 100%)',               glow: '0 0 22px rgba(20,30,70,0.35)'  },
        { g: 'radial-gradient(ellipse at 50% 60%, #1c2545 10%, #0d1225 90%)',               glow: '0 0 24px rgba(30,40,90,0.4)'   },
        { g: 'radial-gradient(ellipse at 50% 55%, #2a2830 0%, #150f20 100%)',               glow: '0 0 26px rgba(60,40,80,0.4)'   },
        { g: 'radial-gradient(ellipse at 50% 50%, #3a2e18 0%, #1a1208 100%)',               glow: '0 0 28px rgba(100,70,10,0.4)'  },
        { g: 'radial-gradient(ellipse at 50% 45%, #6b4e1a 0%, #1e1508 100%)',               glow: '0 0 30px rgba(150,100,15,0.45)'},
        { g: 'radial-gradient(ellipse at 50% 40%, #9a7020 0%, #201808 100%)',               glow: '0 0 32px rgba(180,130,20,0.5)' },
        { g: 'radial-gradient(ellipse at 50% 35%, #b88f24 0%, #201508 100%)',               glow: '0 0 35px rgba(200,150,25,0.55)'},
        { g: 'radial-gradient(ellipse at 50% 30%, #cca02a 10%, #1a1005 90%)',               glow: '0 0 38px rgba(210,160,30,0.6)' },
        { g: 'radial-gradient(ellipse at 50% 25%, #d4af37 0%, #7a5a10 70%, #100a02 100%)', glow: '0 0 42px rgba(212,175,55,0.65)'},
        { g: 'radial-gradient(ellipse at 50% 20%, #f4d4a8 0%, #d4af37 45%, #7a5510 100%)', glow: '0 0 50px rgba(212,175,55,0.8)' },
    ];
    const getStage = (percent) => STAGES[Math.min(10, Math.floor(percent / 10))];

    // ================================================================
    // ВСПОМОГАТЕЛЬНЫЕ ЭКРАНЫ
    // ================================================================
    const LoadingScreen = () => (
        <div className="full-screen">
            <div style={{fontSize:'44px',animation:'spin 2s linear infinite'}}>🧠</div>
            <p style={{color:'var(--gold)',fontSize:'clamp(11px,3vw,13px)',letterSpacing:'2px',textTransform:'uppercase'}}>ЗАГРУЗКА...</p>
        </div>
    );

    const AccessDeniedScreen = ({ onBack }) => (
        <div className="full-screen">
            <div style={{fontSize:'72px'}}>🔐</div>
            <h1 style={{color:'var(--gold)',fontSize:'clamp(18px,5vw,22px)',letterSpacing:'1.5px',textTransform:'uppercase'}}>ДОСТУП НЕ НАЙДЕН</h1>
            <p style={{color:'var(--ice)',maxWidth:'280px',lineHeight:'1.7',fontSize:'clamp(13px,3.5vw,14px)'}}>
                Вы не добавлены в программу.<br/>Напишите в службу заботы:
            </p>
            <a href="https://t.me/teleskapraktiki" target="_blank" rel="noopener noreferrer"
               style={{color:'var(--gold)',textDecoration:'none',fontSize:'15px',borderBottom:'1px solid var(--gold)',paddingBottom:'2px'}}>
                @teleskapraktiki
            </a>
            {onBack && (
                <button onClick={onBack} className="btn btn-secondary" style={{marginTop:'8px'}}>← Назад</button>
            )}
        </div>
    );

    const ErrorScreen = ({ error, onReload }) => (
        <div className="full-screen">
            <div style={{fontSize:'60px'}}>⚠️</div>
            <h2 style={{color:'var(--error-color)',fontSize:'clamp(16px,5vw,20px)'}}>Произошла ошибка</h2>
            {error && <p style={{fontSize:'12px',color:'var(--ice-dim)',maxWidth:'300px',lineHeight:'1.5'}}>{error.message}</p>}
            <p style={{fontSize:'11px',color:'var(--ice-dim)',opacity:0.6}}>{error?.time}</p>
            <button onClick={onReload} className="btn btn-primary" style={{marginTop:'8px'}}>🔄 Перезагрузить</button>
            {error?.stack && (
                <details style={{maxWidth:'320px',textAlign:'left',marginTop:'8px'}}>
                    <summary style={{color:'var(--ice-dim)',fontSize:'11px',cursor:'pointer'}}>Детали ошибки</summary>
                    <pre style={{fontSize:'10px',color:'var(--ice-dim)',overflow:'auto',marginTop:'6px',padding:'8px',background:'var(--ice-faint)',borderRadius:'6px',maxHeight:'150px',opacity:0.7}}>{error.stack}</pre>
                </details>
            )}
        </div>
    );

    // ================================================================
    // ЭКРАН ВХОДА ДЛЯ УЧАСТНИЦ
    // ================================================================
    function EmailLoginScreen({ onSubmit, isLoading, onAdminEntry }) {
        const [email, setEmail] = useState('');
        const [firstName, setFirstName] = useState('');
        const [error, setError] = useState('');
        const submit = async () => {
            if (!email.trim()) { setError('Введите email'); return; }
            setError('');
            await onSubmit(email.trim(), firstName.trim());
        };
        return (
            <div className="container">
                <div className="auth-container">
                    <div className="auth-box">
                        <div style={{marginBottom:'14px',fontSize:'38px'}}>🧠✨</div>
                        <h1 className="auth-title">СЕКРЕТЫ РОСКОШИ</h1>
                        <p className="auth-subtitle">Введите ваш email</p>
                        <input type="email" placeholder="your@email.com"
                            value={email} onChange={e => setEmail(e.target.value)}
                            onKeyPress={e => e.key === 'Enter' && submit()} className="input-field" />
                        <input type="text" placeholder="Ваше имя"
                            value={firstName} onChange={e => setFirstName(e.target.value)}
                            onKeyPress={e => e.key === 'Enter' && submit()} className="input-field" />
                        {error && <p style={{color:'var(--error-color)',fontSize:'12px',marginBottom:'12px'}}>{error}</p>}
                        <button onClick={submit} disabled={isLoading}
                            className="btn btn-primary" style={{width:'100%'}}>
                            {isLoading ? 'Загрузка...' : 'Войти'}
                        </button>
                        <div><span className="admin-link" onClick={onAdminEntry}>Администратор →</span></div>
                    </div>
                </div>
            </div>
        );
    }

    // ================================================================
    // ЭКРАН ВХОДА АДМИНИСТРАТОРА
    // ================================================================
    function AdminLoginScreen({ onLogin, onBack, isLoading }) {
        const [pwd, setPwd] = useState('');
        const [error, setError] = useState('');
        const submit = async () => {
            if (!pwd.trim()) { setError('Введите пароль'); return; }
            setError('');
            const ok = await onLogin(pwd.trim());
            if (!ok) setError('Неверный пароль или ошибка подключения');
        };
        return (
            <div className="container">
                <div className="auth-container">
                    <div className="auth-box">
                        <div style={{marginBottom:'14px',fontSize:'38px'}}>🔐</div>
                        <h1 className="auth-title" style={{fontSize:'clamp(18px,5vw,24px)'}}>АДМИНИСТРАТОР</h1>
                        <p className="auth-subtitle">Вход в панель аналитики</p>
                        <input type="password" placeholder="Пароль"
                            value={pwd} onChange={e => setPwd(e.target.value)}
                            onKeyPress={e => e.key === 'Enter' && submit()}
                            className="input-field" autoFocus />
                        {error && <p style={{color:'var(--error-color)',fontSize:'12px',marginBottom:'12px'}}>{error}</p>}
                        <button onClick={submit} disabled={isLoading}
                            className="btn btn-primary" style={{width:'100%',marginBottom:'10px'}}>
                            {isLoading ? 'Проверка...' : 'Войти'}
                        </button>
                        <button onClick={onBack} className="btn btn-secondary" style={{width:'100%'}}>← Назад</button>
                    </div>
                </div>
            </div>
        );
    }

    // ================================================================
    // ПАНЕЛЬ АДМИНИСТРАТОРА
    // ================================================================
    function AdminPanel({ analytics, analyticsLoading, adminPassword, onLogout, theme, onToggleTheme }) {
        const [expandedTable, setExpandedTable] = useState('overview');
        const [toolsMsg, setToolsMsg] = useState(null);
        const [toolsBusy, setToolsBusy] = useState(false);
        const [syncInfo, setSyncInfo] = useState(null);
        const tEmoji = { эфир:'🎤', практика:'🧘', алгоритм:'📋', задания:'📝' };
        const tLabel  = { эфир:'ЭФИРЫ', практика:'ПРАКТИКИ', алгоритм:'АЛГОРИТМЫ', задания:'ЗАДАНИЯ' };

        const toolCall = async (params, confirmMsg) => {
            if (confirmMsg && !window.confirm(confirmMsg)) return;
            setToolsBusy(true); setToolsMsg(null); setSyncInfo(null);
            try {
                const qs = Object.entries({ ...params, adminPassword }).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join('&');
                const res = await fetch(`${GAS_URL}?${qs}`);
                const d = await res.json();
                if (d.success) {
                    if (params.action === 'checkSync') setSyncInfo(d.sync);
                    else setToolsMsg({ ok: true, text: d.cleared !== undefined ? `Готово. Затронуто строк: ${d.cleared}` : 'Готово!' });
                } else {
                    setToolsMsg({ ok: false, text: d.message || d.error || 'Ошибка' });
                }
            } catch (e) {
                setToolsMsg({ ok: false, text: 'Ошибка сети: ' + e.message });
            } finally {
                setToolsBusy(false);
            }
        };

        const userList = analytics
            ? Object.entries(analytics.userProgress||{})
                .map(([id,d])=>({id,name:d.name,completed:d.completed,percent:d.percent}))
                .sort((a,b)=>b.percent-a.percent)
            : [];
        const byType = {};
        if (analytics) Object.entries(analytics.materialStats||{}).forEach(([id,d]) => {
            if (!byType[d.type]) byType[d.type] = [];
            byType[d.type].push({id,...d});
        });

        return (
            <div className="container">
                <div className="header">
                    <h1 className="header-title">📊 АНАЛИТИКА</h1>
                    <div className="header-btns">
                        <button className="theme-toggle-btn" onClick={onToggleTheme} aria-label="Переключить тему">
                            {theme === 'dark' ? '☀️' : '🌙'}
                        </button>
                        <button onClick={onLogout} className="logout-btn">Выйти</button>
                    </div>
                </div>

                {analyticsLoading ? <LoadingScreen /> : !analytics ? (
                    <div className="card"><p style={{color:'var(--ice-dim)',textAlign:'center',padding:'20px'}}>Нет данных. Проверь GAS_URL.</p></div>
                ) : (<>
                    <div className="card">
                        <h2 className="card-title">📈 ОБЗОР</h2>
                        <div className="analytics-grid">
                            <div className="chart-container">
                                <div className="chart-title">По типам</div>
                                <div className="bar-chart">
                                    {Object.keys(byType).map(type => {
                                        const total = byType[type].reduce((s,m)=>s+(m.completions||0),0);
                                        const max = byType[type].length*(analytics.totalUsers||1);
                                        const pct = max>0?Math.round(total/max*100):0;
                                        return (<div key={type} className="bar-item">
                                            <span className="bar-label">{tEmoji[type]||'📄'} {type}</span>
                                            <div className="bar-fill" style={{width:Math.max(5,pct)+'%'}}></div>
                                            <span className="bar-text">{pct}%</span>
                                        </div>);
                                    })}
                                </div>
                            </div>
                            <div className="chart-container">
                                <div className="chart-title">👥 Активность</div>
                                <div style={{display:'flex',gap:'8px',justifyContent:'center',flexWrap:'wrap',width:'100%'}}>
                                    {[{v:analytics.totalUsers,l:'участниц'},{v:analytics.totalMaterials,l:'материалов'},{v:analytics.avgProgress+'%',l:'средний'}].map(s=>(
                                        <div key={s.l} className="stat-small"><div className="stat-small-value">{s.v}</div><div className="stat-small-label">{s.l}</div></div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <h2 className="card-title" style={{marginBottom:0}}>🏆 РЕЙТИНГ</h2>
                            <button onClick={()=>setExpandedTable(expandedTable==='rating'?null:'rating')} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:'12px'}}>{expandedTable==='rating'?'▼ Скрыть':'▶ Показать'}</button>
                        </div>
                        {expandedTable==='rating' && (
                            <div className="table-wrapper">
                                <table className="table"><thead><tr><th style={{width:'25px'}}>№</th><th>Имя</th><th style={{width:'70px'}}>Выполнено</th><th style={{width:'40px'}}>%</th></tr></thead>
                                <tbody>{userList.map((u,i)=>(<tr key={u.id}><td><span className="rating-badge">{i+1}</span></td><td>{u.name}</td><td>{u.completed}/{analytics.totalMaterials}</td><td style={{color:'var(--gold)',fontWeight:'600'}}>{u.percent}%</td></tr>))}</tbody></table>
                            </div>
                        )}
                    </div>

                    {Object.entries(byType).map(([type,items])=>{
                        const key=`t_${type}`;
                        return (<div key={type} className="card">
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                <h2 className="card-title" style={{marginBottom:0}}>{tEmoji[type]||'📄'} {tLabel[type]||type.toUpperCase()}</h2>
                                <button onClick={()=>setExpandedTable(expandedTable===key?null:key)} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:'12px'}}>{expandedTable===key?'▼ Скрыть':'▶ Показать'}</button>
                            </div>
                            {expandedTable===key && (<div className="table-wrapper">
                                <table className="table"><thead><tr><th>Название</th><th style={{width:'75px'}}>Выполнили</th><th style={{width:'40px'}}>%</th></tr></thead>
                                <tbody>{items.map(m=>(<tr key={m.id}><td style={{maxWidth:'160px'}}>{m.title}</td><td>{m.completions}/{analytics.totalUsers}</td><td>{m.percent}%</td></tr>))}</tbody></table>
                            </div>)}
                        </div>);
                    })}
                </>)}

                {/* ── ИНСТРУМЕНТЫ АДМИНИСТРАТОРА ── */}
                <div className="card">
                    <h2 className="card-title">🛠 ИНСТРУМЕНТЫ</h2>
                    <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                        <button
                            disabled={toolsBusy}
                            onClick={() => toolCall({action:'checkSync'}, null)}
                            style={{padding:'10px 14px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',background:'var(--surface)',color:'var(--ice)',cursor:'pointer',textAlign:'left',fontFamily:'inherit',fontSize:'14px'}}
                        >🔍 Проверить синхронизацию</button>
                        <button
                            disabled={toolsBusy}
                            onClick={() => toolCall({action:'resetProgressData'}, '⚠️ Сбросить ВСЕ результаты прогресса? Это действие нельзя отменить!')}
                            style={{padding:'10px 14px',borderRadius:'var(--radius-sm)',border:'1px solid rgba(139,58,58,0.4)',background:'rgba(139,58,58,0.08)',color:'var(--error-color)',cursor:'pointer',textAlign:'left',fontFamily:'inherit',fontSize:'14px'}}
                        >🗑 Сбросить прогресс участниц</button>
                        <button
                            disabled={toolsBusy}
                            onClick={() => toolCall({action:'clearLogSheet',sheetName:'Действия'}, 'Очистить лист «Действия»?')}
                            style={{padding:'10px 14px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',background:'var(--surface)',color:'var(--ice)',cursor:'pointer',textAlign:'left',fontFamily:'inherit',fontSize:'14px'}}
                        >🧹 Очистить лог «Действия»</button>
                        <button
                            disabled={toolsBusy}
                            onClick={() => toolCall({action:'clearLogSheet',sheetName:'Ошибки'}, 'Очистить лист «Ошибки»?')}
                            style={{padding:'10px 14px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',background:'var(--surface)',color:'var(--ice)',cursor:'pointer',textAlign:'left',fontFamily:'inherit',fontSize:'14px'}}
                        >🧹 Очистить лог «Ошибки»</button>
                    </div>
                    {toolsBusy && <p style={{marginTop:'12px',color:'var(--ice-dim)',fontSize:'13px',textAlign:'center'}}>⏳ Выполняется...</p>}
                    {toolsMsg && (
                        <p style={{marginTop:'12px',fontSize:'13px',color:toolsMsg.ok?'var(--green)':'var(--error-color)',textAlign:'center'}}>
                            {toolsMsg.ok ? '✅ ' : '❌ '}{toolsMsg.text}
                        </p>
                    )}
                    {syncInfo && (
                        <div style={{marginTop:'12px',fontSize:'13px',color:'var(--ice)',lineHeight:'1.8'}}>
                            <div>👥 Участниц в базе: <b>{syncInfo.totalUsers}</b></div>
                            <div>📊 Из них с прогрессом: <b>{syncInfo.usersWithProgress}</b></div>
                            <div>📚 Активных материалов: <b>{syncInfo.totalMaterials}</b></div>
                            <div>📝 Строк в progress: <b>{syncInfo.totalProgressRows}</b></div>
                            <div>✅ Выполнено (строк): <b>{syncInfo.completedRows}</b></div>
                            {syncInfo.progressKeys?.length > 0 && (
                                <div style={{marginTop:'8px',fontSize:'12px',color:'var(--ice-dim)',wordBreak:'break-all'}}>
                                    Ключи прогресса: {syncInfo.progressKeys.join(', ')}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // ================================================================
    // КАБИНЕТ УЧАСТНИЦЫ
    // ================================================================
    function App({ user, onLogout, theme, onToggleTheme }) {
        const [materials, setMaterials] = useState([]);
        const [completions, setCompletions] = useState({});
        const [loading, setLoading] = useState(true);
        const [loadError, setLoadError] = useState(null);
        const [expandCompleted, setExpandCompleted] = useState(false);
        const [expandedCompleted, setExpandedCompleted] = useState({});
        const [collapsedTypes, setCollapsedTypes] = useState({});
        const [expandedDescriptions, setExpandedDescriptions] = useState({});
        const [toasts, setToasts] = useState([]);
        const [saving, setSaving] = useState({});

        // Фильтры — восстанавливаем из localStorage
        const savedF = (() => { try { return JSON.parse(localStorage.getItem('srl_filters')||'{}'); } catch { return {}; } })();
        const [typeFilter,   setTypeFilter]   = useState(savedF.type   || 'all');
        const [statusFilter, setStatusFilter] = useState(savedF.status || 'incomplete');
        const [searchQuery,  setSearchQuery]  = useState(savedF.search || '');

        useEffect(() => {
            try { localStorage.setItem('srl_filters', JSON.stringify({ type: typeFilter, status: statusFilter, search: searchQuery })); }
            catch {}
        }, [typeFilter, statusFilter, searchQuery]);

        // ── ТОСТЫ ────────────────────────────────────────
        const TOAST_ICONS = { success:'✓', error:'⚠️', warning:'⚡', info:'ℹ️' };
        const showToast = (msg, type='success', duration=2500) => {
            const id = Date.now() + Math.random();
            setToasts(prev => [...prev, { id, msg, type, removing: false }]);
            setTimeout(() => {
                setToasts(prev => prev.map(t => t.id===id ? {...t, removing:true} : t));
                setTimeout(() => setToasts(prev => prev.filter(t => t.id!==id)), 280);
            }, duration);
        };

        // ── ВСПОМОГАТЕЛЬНАЯ: отправить запрос, при неудаче — одна повторная попытка через 3с ──
        const sendLog = (url) => {
            fetch(url).catch(() => {
                setTimeout(() => fetch(url).catch(() => {}), 3000);
            });
        };

        // ── ЛОГИРОВАНИЕ ДЕЙСТВИЙ (не блокирует UI, 1 повтор при ошибке) ──
        const logAction = (actionType, materialId, materialTitle, details) => {
            const uid = String(user?.username || user?.email || user?.id || 'unknown');
            sendLog(
                `${GAS_URL}?action=logAction` +
                `&user_id=${encodeURIComponent(uid)}` +
                `&actionType=${encodeURIComponent(actionType)}` +
                `&materialId=${encodeURIComponent(materialId)}` +
                `&materialTitle=${encodeURIComponent(String(materialTitle||'').substring(0,100))}` +
                `&details=${encodeURIComponent(JSON.stringify(details||{}).substring(0,300))}`
            );
        };

        // ── ЛОГИРОВАНИЕ ОШИБОК (1 повтор при ошибке) ────
        const logError = (errorType, message, stackTrace) => {
            const uid = String(user?.username || user?.email || user?.id || 'unknown');
            sendLog(
                `${GAS_URL}?action=logError` +
                `&user_id=${encodeURIComponent(uid)}` +
                `&errorType=${encodeURIComponent(errorType)}` +
                `&message=${encodeURIComponent(String(message||'').substring(0,400))}` +
                `&stackTrace=${encodeURIComponent(String(stackTrace||'').substring(0,500))}` +
                `&url=${encodeURIComponent(window.location.href)}`
            );
        };

        const resetFilters = () => {
            setTypeFilter('all'); setStatusFilter('all'); setSearchQuery('');
            showToast('Фильтры очищены', 'info', 1800);
        };
        const isFiltered = typeFilter !== 'all' || statusFilter !== 'all' || searchQuery.trim();
        const toggleTypeCollapse = (type) => setCollapsedTypes(prev => ({ ...prev, [type]: !prev[type] }));
        const toggleDesc = (id) => setExpandedDescriptions(prev => ({ ...prev, [id]: !prev[id] }));

        const userId = String(user?.username || user?.email || user?.id || '');

        useEffect(() => {
            if (!user) return;
            setLoading(true);
            const load = async () => {
                try {
                    const [matRes, progRes] = await Promise.all([
                        fetch(`${GAS_URL}?action=getMaterials`),
                        fetch(`${GAS_URL}?action=getProgress&user_id=${encodeURIComponent(userId)}`)
                    ]);
                    const matData = await matRes.json();
                    const progData = await progRes.json();
                    const mats = matData.materials || [];
                    const prog = progData.progress || {};
                    setMaterials(mats);
                    const c = {};
                    mats.forEach(m => {
                        c[m.id] = prog[m.id] || { done: false, feedback: '', want_repeat: false };
                    });
                    setCompletions(c);
                } catch (e) {
                    setLoadError('Не удалось загрузить данные. Проверьте подключение.');
                    logError('load_error', e.message, e.stack);
                } finally {
                    setLoading(false);
                }
            };
            load();
        }, [user]);

        const toggleComplete = async (materialId) => {
            if (saving[materialId]) return;
            const newDone = !completions[materialId]?.done;
            setCompletions(prev => ({ ...prev, [materialId]: { ...prev[materialId], done: newDone } }));
            setSaving(prev => ({ ...prev, [materialId]: true }));
            const mat = materials.find(m => m.id === materialId);
            try {
                await fetch(`${GAS_URL}?action=updateProgress&user_id=${encodeURIComponent(userId)}&material_id=${encodeURIComponent(materialId)}&done=${newDone}`);
                showToast(newDone ? '✓ Выполнено' : '○ Отмечено');
                logAction('toggle_complete', materialId, mat?.title||'', { done: newDone });
            } catch (e) {
                setCompletions(prev => ({ ...prev, [materialId]: { ...prev[materialId], done: !newDone } }));
                showToast('⚠️ Ошибка сохранения', 'error');
                logError('toggle_error', e.message, e.stack);
            } finally {
                setSaving(prev => ({ ...prev, [materialId]: false }));
            }
        };

        const saveFeedback = async (materialId, fb) => {
            const cur = completions[materialId]?.feedback;
            const nfb = cur === fb ? '' : fb;
            setCompletions(prev => ({ ...prev, [materialId]: { ...prev[materialId], feedback: nfb } }));
            const mat = materials.find(m => m.id === materialId);
            try {
                await fetch(`${GAS_URL}?action=saveFeedback&user_id=${encodeURIComponent(userId)}&material_id=${encodeURIComponent(materialId)}&feedback=${encodeURIComponent(nfb)}`);
                showToast(nfb ? `Отмечено: ${nfb}` : 'Выбор снят', 'success', 2000);
                logAction('save_feedback', materialId, mat?.title||'', { feedback: nfb });
            } catch (e) {
                showToast('Ошибка сохранения', 'error');
                logError('feedback_error', e.message, e.stack);
            }
        };

        const toggleRepeat = async (materialId) => {
            const ns = !completions[materialId]?.want_repeat;
            setCompletions(prev => ({ ...prev, [materialId]: { ...prev[materialId], want_repeat: ns } }));
            const mat = materials.find(m => m.id === materialId);
            try {
                await fetch(`${GAS_URL}?action=saveFeedback&user_id=${encodeURIComponent(userId)}&material_id=${encodeURIComponent(materialId)}&want_repeat=${ns}`);
                showToast(ns ? '🔄 Отмечено на повторение' : 'Повторение снято', ns?'success':'info', 2000);
                logAction('toggle_repeat', materialId, mat?.title||'', { want_repeat: ns });
            } catch (e) {
                showToast('Ошибка сохранения', 'error');
                logError('repeat_error', e.message, e.stack);
            }
        };

        if (loading) return <LoadingScreen />;

        if (loadError) return (
            <div className="full-screen">
                <div style={{fontSize:'60px'}}>⚠️</div>
                <p style={{color:'var(--ice)',fontSize:'14px',maxWidth:'280px',lineHeight:'1.6'}}>{loadError}</p>
                <button onClick={() => window.location.reload()} className="btn btn-primary">Обновить</button>
            </div>
        );

        const totalDone = Object.values(completions).filter(c=>c.done).length;
        const totalMaterials = materials.length;
        const pct = totalMaterials>0 ? Math.round(totalDone/totalMaterials*100) : 0;
        const stage = getStage(pct);
        const typeStats = {};
        materials.forEach(m => {
            if (!typeStats[m.type]) typeStats[m.type]={done:0,total:0};
            typeStats[m.type].total++;
            if (completions[m.id]?.done) typeStats[m.type].done++;
        });
        const availableTypes = [...new Set(materials.map(m=>m.type))];
        const typeEmojis = {эфир:'🎤',практика:'🧘',алгоритм:'📋',задания:'📝'};
        const typeLabels = {эфир:'Эфиры',практика:'Практики',алгоритм:'Алгоритмы',задания:'Задания'};
        const completedMaterials = materials.filter(m=>completions[m.id]?.done);
        const repeatMaterials = materials.filter(m=>completions[m.id]?.want_repeat);

        let filtered = materials;
        if (statusFilter==='complete') filtered=completedMaterials;
        else if (statusFilter==='repeat') filtered=repeatMaterials;
        else if (statusFilter==='incomplete') filtered=materials.filter(m=>!completions[m.id]?.done);
        if (typeFilter!=='all') filtered=filtered.filter(m=>m.type===typeFilter);
        if (searchQuery.trim()) filtered=filtered.filter(m=>m.title.toLowerCase().includes(searchQuery.toLowerCase()));
        const grouped = {};
        filtered.forEach(m => { if (!grouped[m.type]) grouped[m.type]=[]; grouped[m.type].push(m); });

        return (
            <React.Fragment>
            <div className="container">
                <div className="header">
                    <h1 className="header-title">✨ {(user?.first_name||'Участница').toUpperCase()}</h1>
                    <div className="header-btns">
                        <button className="theme-toggle-btn" onClick={onToggleTheme} aria-label="Переключить тему" title={theme==='dark'?'Светлая тема':'Тёмная тема'}>
                            {theme === 'dark' ? '☀️' : '🌙'}
                        </button>
                        <button onClick={onLogout} className="logout-btn">Выйти</button>
                    </div>
                </div>

                {/* ТРАНСФОРМАЦИЯ */}
                <div className="transformation">
                    <h2 className="transformation-title">Текущая интеграция</h2>
                    <div className="transformation-visual" style={{ background: stage.g, boxShadow: stage.glow }}></div>
                    <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`}}></div></div>
                    <div className="progress-text">ПРОГРЕСС: {pct}% ЗАВЕРШЕНО</div>
                    <div className="neural-stats">
                        {availableTypes.map(type=>(
                            <div key={type} className="stat-item">
                                <div className="stat-number">{typeStats[type]?.done||0}/{typeStats[type]?.total||0}</div>
                                <span className="stat-emoji">{typeEmojis[type]||'📄'}</span>
                                <div className="stat-label">{typeLabels[type]||type}</div>
                            </div>
                        ))}
                    </div>
                </div>

                {/* МАТЕРИАЛЫ */}
                <div className="card">
                    <h2 className="card-title">Материалы</h2>

                    {completedMaterials.length>0 && (
                        <div className="completed-compact" onClick={()=>setExpandCompleted(!expandCompleted)}>
                            <div className="completed-header">
                                <div className="completed-text">✅ Завершено: {completedMaterials.length}</div>
                                <div style={{fontSize:'12px',color:'var(--ice-dim)'}}>{expandCompleted?'▼':'▶'}</div>
                            </div>
                            {expandCompleted && (
                                <div className="completed-list">
                                    {completedMaterials.map(m=>{
                                        const isExp=expandedCompleted[m.id];
                                        const links=m.links||[];
                                        return (<div key={m.id}>
                                            <div className="completed-item" onClick={e=>{e.stopPropagation();setExpandedCompleted({...expandedCompleted,[m.id]:!isExp});}}>
                                                <span className="completed-item-type">{m.type}</span>
                                                <span className="completed-item-text">{m.title.substring(0,45)}</span>
                                                <span style={{fontSize:'12px',color:'var(--ice-dim)'}}>{isExp?'▼':'▶'}</span>
                                            </div>
                                            {isExp && links.length>0 && (
                                                <div className="completed-item-expanded">
                                                    {links.map((lnk,i)=>(
                                                        <a key={i} href={lnk} target="_blank" rel="noopener noreferrer" className="material-link">
                                                            {links.length>1 ? `Часть ${i+1} →` : 'Перейти →'}
                                                        </a>
                                                    ))}
                                                </div>
                                            )}
                                        </div>);
                                    })}
                                </div>
                            )}
                        </div>
                    )}

                    {/* ФИЛЬТРЫ */}
                    <div className="filters">
                        <div className="filters-row">
                            <span className="filter-row-label">Тип:</span>
                            <button className={`filter-btn ${typeFilter==='all'?'active':''}`} onClick={()=>setTypeFilter('all')}>Все</button>
                            {availableTypes.map(type=>(
                                <button key={type} className={`filter-btn ${typeFilter===type?'active':''}`} onClick={()=>setTypeFilter(type)}>
                                    {typeEmojis[type]||'📄'} {typeLabels[type]||type}
                                </button>
                            ))}
                            {isFiltered && <button className="filters-reset" onClick={resetFilters}>✕ Сброс</button>}
                        </div>
                        <div className="filters-row">
                            <span className="filter-row-label">Статус:</span>
                            <button className={`filter-btn ${statusFilter==='all'?'active':''}`} onClick={()=>setStatusFilter('all')}>Все</button>
                            <button className={`filter-btn ${statusFilter==='incomplete'?'active':''}`} onClick={()=>setStatusFilter('incomplete')}>○ Не сделано</button>
                            <button className={`filter-btn ${statusFilter==='complete'?'active':''}`} onClick={()=>setStatusFilter('complete')}>✓ Выполнено</button>
                            <button className={`filter-btn ${statusFilter==='repeat'?'active':''}`} onClick={()=>setStatusFilter('repeat')}>🔄 Повтор</button>
                        </div>
                    </div>

                    <div className="search-wrap">
                        <input type="text" placeholder="🔍 Поиск по названию..."
                            value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                            className="search-input" aria-label="Поиск по материалам" />
                        {searchQuery && (
                            <button className="search-clear" onClick={()=>setSearchQuery('')} aria-label="Очистить поиск">✕</button>
                        )}
                    </div>

                    {filtered.length>0 ? Object.keys(grouped).map(type=>(
                        <div key={type} className="type-section">
                            <div className="type-header"
                                onClick={()=>toggleTypeCollapse(type)}
                                aria-expanded={!collapsedTypes[type]}
                                aria-controls={`section-${type}`}
                                role="button" tabIndex="0"
                                onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&toggleTypeCollapse(type)}>
                                <span>{typeEmojis[type]||'📄'} {typeLabels[type]||type} <span style={{fontSize:'clamp(9px,2vw,10px)',color:'var(--ice-dim)',fontWeight:400}}>({grouped[type].length})</span></span>
                                <span className={`type-arrow ${collapsedTypes[type]?'closed':''}`}>▼</span>
                            </div>
                            <div id={`section-${type}`} className={`materials-list ${collapsedTypes[type]?'collapsed':''}`}>
                            {grouped[type].map(material=>{
                                const comp = completions[material.id]||{done:false,feedback:'',want_repeat:false};
                                const links = material.links||[];
                                const hasDesc = material.description && material.description.trim().length > 0;
                                const descExpanded = expandedDescriptions[material.id];
                                return (
                                    <div key={material.id} className="material-item">
                                        <div className="material-header">
                                            <input type="checkbox" checked={comp.done}
                                                onChange={()=>toggleComplete(material.id)}
                                                disabled={!!saving[material.id]}
                                                className="material-checkbox"
                                                id={`m-${material.id}`}
                                                aria-label={`${comp.done?'Отметить невыполненным':'Отметить выполненным'}: ${material.title}`} />
                                            <div className="material-content">
                                                <label htmlFor={`m-${material.id}`} style={{cursor:'pointer'}}>
                                                    <div className={`material-title ${comp.done?'completed':''}`}>{material.title}</div>
                                                </label>
                                                <div className="material-meta">
                                                    <span className="material-type">{material.type}</span>
                                                </div>

                                                {/* ОПИСАНИЕ — сворачиваемое */}
                                                {hasDesc && (
                                                    <>
                                                        <button className="desc-toggle" onClick={()=>toggleDesc(material.id)}>
                                                            {descExpanded ? '▲ Скрыть' : '▼ Описание'}
                                                        </button>
                                                        <div className={`desc-body ${descExpanded?'expanded':''}`}>
                                                            <div className="desc-text">{material.description}</div>
                                                        </div>
                                                    </>
                                                )}

                                                {/* КНОПКИ ССЫЛОК */}
                                                {links.length>0 && (
                                                    <div className="links-row">
                                                        {links.map((lnk,i)=>(
                                                            <a key={i} href={lnk} target="_blank" rel="noopener noreferrer"
                                                               className="material-link">
                                                                {links.length>1 ? `Часть ${i+1} →` : '▶ Открыть материал'}
                                                            </a>
                                                        ))}
                                                    </div>
                                                )}

                                                {comp.done && (
                                                    <div className="feedback-section">
                                                        <label className="feedback-label">Что было самым ценным?</label>
                                                        <div className="feedback-options">
                                                            {['Инсайт','Практика','Пример','Пока не поняла'].map(opt=>(
                                                                <label key={opt} className={`radio-opt ${comp.feedback===opt?'selected':''}`}>
                                                                    <input type="radio"
                                                                        name={`fb-${material.id}`}
                                                                        value={opt}
                                                                        checked={comp.feedback===opt}
                                                                        onChange={()=>saveFeedback(material.id,opt)} />
                                                                    {opt}
                                                                </label>
                                                            ))}
                                                        </div>
                                                        <label className={`repeat-label ${comp.want_repeat?'active':''}`}>
                                                            <input type="checkbox" className="repeat-cb"
                                                                checked={comp.want_repeat}
                                                                onChange={()=>toggleRepeat(material.id)} />
                                                            🔄 Хочу повторить
                                                        </label>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            </div>
                        </div>
                    )) : (
                        <div className="empty-state">
                            <p style={{fontSize:'36px',marginBottom:'10px'}}>{isFiltered ? '🔍' : '🎉'}</p>
                            <p style={{marginBottom:isFiltered?'12px':'0'}}>
                                {isFiltered ? 'По этому фильтру ничего не найдено' : 'Все материалы выполнены!'}
                            </p>
                            {isFiltered && (
                                <button className="filters-reset" style={{margin:'0 auto'}} onClick={resetFilters}>
                                    ✕ Сбросить фильтры
                                </button>
                            )}
                        </div>
                    )}
                </div>
            </div>
            {toasts.length > 0 && (
                <div className="toast-container">
                    {toasts.map(t => (
                        <div key={t.id} className={`toast ${t.type}${t.removing?' removing':''}`}>
                            <span className="toast-icon">{TOAST_ICONS[t.type]||'✓'}</span>
                            {t.msg}
                        </div>
                    ))}
                </div>
            )}
            </React.Fragment>
        );
    }

    // ================================================================
    // КОРНЕВОЙ КОМПОНЕНТ — управляет всеми экранами
    // ================================================================
    function AppWithTelegramIntegration() {
        const [screen, setScreen] = useState('loading');
        const [user, setUser] = useState(null);
        const [loginLoading, setLoginLoading] = useState(false);
        const [analytics, setAnalytics] = useState(null);
        const [analyticsLoading, setAnalyticsLoading] = useState(false);
        const [adminPassword, setAdminPassword] = useState('');
        const [hasError, setHasError] = useState(false);
        const [lastError, setLastError] = useState(null);

        // ── ТЕМА ────────────────────────────────────────
        const [theme, setTheme] = useState(() => {
            try { return localStorage.getItem('srl_theme') || 'light'; } catch { return 'light'; }
        });
        useEffect(() => {
            document.body.className = theme === 'dark' ? 'theme-dark' : '';
            try { localStorage.setItem('srl_theme', theme); } catch {}
        }, [theme]);
        const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

        // ── ГЛОБАЛЬНЫЙ ПЕРЕХВАТ ОШИБОК ───────────────────
        useEffect(() => {
            const handler = (event) => {
                setHasError(true);
                setLastError({
                    message: event.message,
                    stack: event.error?.stack || '',
                    time: new Date().toLocaleString()
                });
                // Попытка залогировать ошибку (1 повтор при неудаче)
                const uid = user?.username || user?.email || user?.id || 'unknown';
                const logUrl =
                    `${GAS_URL}?action=logError` +
                    `&user_id=${encodeURIComponent(uid)}` +
                    `&errorType=uncaught_error` +
                    `&message=${encodeURIComponent(String(event.message||'').substring(0,400))}` +
                    `&stackTrace=${encodeURIComponent(String(event.error?.stack||'').substring(0,500))}` +
                    `&url=${encodeURIComponent(window.location.href)}`;
                fetch(logUrl).catch(() => { setTimeout(() => fetch(logUrl).catch(()=>{}), 3000); });
            };
            window.addEventListener('error', handler);
            return () => window.removeEventListener('error', handler);
        }, [user]);

        useEffect(() => {
            const init = async () => {
                try {
                    if (window.Telegram?.WebApp) {
                        window.Telegram.WebApp.ready();
                        window.Telegram.WebApp.expand();
                        const tg = window.Telegram.WebApp.initDataUnsafe?.user;
                        if (tg) { await checkTelegram(tg); return; }
                    }
                    setScreen('email-login');
                } catch (e) { setScreen('email-login'); }
            };
            init();
        }, []);

        const checkTelegram = async (tg) => {
            try {
                const res = await fetch(`${GAS_URL}?action=getUser&telegram_id=${encodeURIComponent(tg.id)}&username=${encodeURIComponent(tg.username||'')}&email=`);
                const d = await res.json();
                if (d.success && d.user?.access==='yes') { setUser(d.user); setScreen('app'); }
                else setScreen('access-denied');
            } catch (e) { setScreen('email-login'); }
        };

        const handleEmailLogin = async (email, firstName) => {
            setLoginLoading(true);
            try {
                const res = await fetch(`${GAS_URL}?action=getUser&telegram_id=&username=&email=${encodeURIComponent(email)}`);
                const d = await res.json();
                if (d.success && d.user?.access==='yes') { setUser(d.user); setScreen('app'); }
                else setScreen('access-denied');
            } catch (e) { alert('Ошибка подключения. Попробуйте снова.'); }
            finally { setLoginLoading(false); }
        };

        const handleAdminLogin = async (pwd) => {
            setLoginLoading(true);
            setAnalyticsLoading(true);
            try {
                const res = await fetch(`${GAS_URL}?action=getAnalytics&adminPassword=${encodeURIComponent(pwd)}`);
                const d = await res.json();
                if (d.success) { setAnalytics(d.analytics); setAdminPassword(pwd); setScreen('admin'); return true; }
                return false;
            } catch (e) { return false; }
            finally { setLoginLoading(false); setAnalyticsLoading(false); }
        };

        const handleLogout = () => { setUser(null); setScreen('email-login'); };
        const handleAdminLogout = () => { setAnalytics(null); setAdminPassword(''); setScreen('email-login'); };

        // Экран ошибки
        if (hasError) return <ErrorScreen error={lastError} onReload={() => window.location.reload()} />;

        if (screen==='loading')       return <LoadingScreen />;
        if (screen==='access-denied') return <AccessDeniedScreen onBack={() => setScreen('email-login')} />;
        if (screen==='email-login')   return <EmailLoginScreen onSubmit={handleEmailLogin} isLoading={loginLoading} onAdminEntry={() => setScreen('admin-login')} />;
        if (screen==='admin-login')   return <AdminLoginScreen onLogin={handleAdminLogin} onBack={() => setScreen('email-login')} isLoading={loginLoading} />;
        if (screen==='admin')         return <AdminPanel analytics={analytics} analyticsLoading={analyticsLoading} adminPassword={adminPassword} onLogout={handleAdminLogout} theme={theme} onToggleTheme={toggleTheme} />;
        return <App user={user} onLogout={handleLogout} theme={theme} onToggleTheme={toggleTheme} />;
    }

    ReactDOM.render(<AppWithTelegramIntegration />, document.getElementById('root'));
</script>
</body>
</html>
